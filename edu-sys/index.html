<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テスト一覧メニュー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ヘッダーやアクセントのカラー */
        .header-bg { background-color: #005662; }
        .tab-bg { background-color: #e5f1f4; }
        .status-active { background-color: #a0c832; } /* テスト受付中（黄緑） */
        .status-prep { background-color: #4bc0c8; } /* テスト準備中（水色） */
    </style>
</head>
<body class="bg-white text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto overflow-hidden">
        <div class="flex-grow pb-6 overflow-y-auto">
            <h1 class="text-xl font-bold mb-2 flex justify-between items-end">
                <span>教育制度論 対策</span>
            </h1>

            <!-- タブメニュー -->
            <div class="flex border-b border-gray-300 mb-4">
                <button id="tab-assignments" onclick="switchTab('assignments')" class="tab-btn px-6 py-2 font-bold text-gray-800 border-b-2 border-blue-600 transition-colors">
                    課題
                </button>
                <button id="tab-comprehensive" onclick="switchTab('comprehensive')" class="tab-btn px-6 py-2 font-bold text-gray-500 hover:text-gray-800 border-b-2 border-transparent transition-colors">
                    総合テスト
                </button>
            </div>

            <!-- 総合テスト用の説明書き（初期状態は非表示） -->
            <div id="comprehensive-desc" class="hidden bg-blue-50 border border-blue-200 text-blue-800 p-3 rounded mb-4 text-sm">
                💡 <strong>総合テストについて</strong><br>
                レベルが上がるほど、出題される問題の範囲（データベース）が広く、難易度が上がっていきます。
            </div>

            <!-- テスト一覧テーブル -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm border-collapse border border-gray-300 text-center min-w-[500px]">
                    <thead class="bg-gray-100 text-gray-700 whitespace-nowrap">
                        <tr>
                            <th class="border border-gray-300 p-3 font-normal w-1/3">テスト名</th>
                            <th class="border border-gray-300 p-3 font-normal">ステータス</th>
                            <th class="border border-gray-300 p-3 font-normal">合格点数</th>
                            <th class="border border-gray-300 p-3 font-normal">実施</th>
                        </tr>
                    </thead>
                    <tbody id="test-list-body">
                        <!-- ここにJavaScriptでリストが生成されます -->
                    </tbody>
                </table>
            </div>

            <!-- ページネーション -->
            <div class="bg-gray-200 p-2 mt-2 flex justify-center items-center text-sm text-gray-600 gap-4">
                <span id="pagination-info">14件 (1/1)</span>
                <div class="flex gap-3">
                    <span class="text-gray-500">&lt;</span>
                    <span class="text-gray-700 font-bold">1</span>
                    <span class="text-gray-500">&gt;</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 【データ定義】
         * タブごとに表示するデータを分けて管理します。
         */
        const testsData = {
            // 課題タブのデータ
            assignments: [
                { id: 1, name: "第1回課題", status: "active", link: "./test01/index.html", passScore: "5点" },
                { id: 2, name: "第2回課題", status: "active", link: "./test02/index.html", passScore: "5点" },
                { id: 3, name: "第3回課題", status: "active", link: "./test03/index.html", passScore: "5点" },
                { id: 4, name: "第4回課題", status: "prep", link: "./test04/index.html", passScore: "-" },
                { id: 5, name: "第5回課題", status: "prep", link: "./test05/index.html", passScore: "-" },
                { id: 6, name: "第6回課題", status: "prep", link: "./test06/index.html", passScore: "-" },
                { id: 7, name: "第7回課題", status: "prep", link: "./test07/index.html", passScore: "-" },
                { id: 8, name: "第8回課題", status: "prep", link: "./test08/index.html", passScore: "-" },
                { id: 9, name: "第9回課題", status: "prep", link: "./test09/index.html", passScore: "-" },
                { id: 10, name: "第10回課題", status: "prep", link: "./test10/index.html", passScore: "-" },
                { id: 11, name: "第11回課題", status: "prep", link: "./test11/index.html", passScore: "-" },
                { id: 12, name: "第12回課題", status: "prep", link: "./test12/index.html", passScore: "-" },
                { id: 13, name: "第13回課題", status: "prep", link: "./test13/index.html", passScore: "-" },
                { id: 14, name: "第14回課題", status: "prep", link: "./test14/index.html", passScore: "-" },
            ],
            // 総合テストタブのデータ
            // 公開する際は status を "active" に変更し、link にパスを設定してください。
            comprehensive: [
                { id: "comp_1", name: "レベル1", status: "active", link: "./comp01/index.html", passScore: "5" },
                { id: "comp_2", name: "レベル2", status: "prep", link: "./comp02/index.html", passScore: "" },
                { id: "comp_3", name: "レベル3", status: "prep", link: "./comp03/index.html", passScore: "-" },
                { id: "comp_4", name: "レベル4", status: "prep", link: "./comp04/index.html", passScore: "-" },
                { id: "comp_5", name: "レベル5", status: "prep", link: "./comp05/index.html", passScore: "-" },
                { id: "comp_6", name: "レベル6", status: "prep", link: "./comp06/index.html", passScore: "-" },
                { id: "comp_7", name: "レベル7", status: "prep", link: "./comp07/index.html", passScore: "-" },
                { id: "comp_8", name: "レベル8", status: "prep", link: "./comp08/index.html", passScore: "-" },
                { id: "comp_9", name: "レベル9", status: "prep", link: "./comp09/index.html", passScore: "-" },
                { id: "comp_10", name: "レベル10", status: "prep", link: "./comp10/index.html", passScore: "-" },
                { id: "comp_11", name: "レベル11", status: "prep", link: "./comp11/index.html", passScore: "-" },
                { id: "comp_12", name: "レベル12", status: "prep", link: "./comp12/index.html", passScore: "-" },
                { id: "comp_13", name: "レベル13", status: "prep", link: "./comp13/index.html", passScore: "-" },
                { id: "comp_14", name: "レベル14", status: "prep", link: "./comp14/index.html", passScore: "-" },
                { id: "comp_15", name: "レベル15", status: "prep", link: "./comp15/index.html", passScore: "-" },
            ]
        };

        // --- テーブル描画・タブ切り替えロジック ---
        let currentTab = 'assignments'; // 初期表示するタブ
        const tbody = document.getElementById('test-list-body');
        const paginationInfo = document.getElementById('pagination-info');

        // テーブルを描画する関数
        function renderTable() {
            tbody.innerHTML = ''; // テーブルの中身を一度リセット
            const currentData = testsData[currentTab]; // 選択中のタブのデータを取得

            currentData.forEach(test => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";

                // ステータスに応じた処理の分岐
                const isActive = test.status === "active";
                const statusLabel = isActive ? "テスト受付中" : "テスト準備中";
                const statusClass = isActive ? "status-active" : "status-prep";
                
                // 準備中の場合はリンクを無効化するクラスを付与
                const linkTagOpen = isActive 
                    ? `<a href="${test.link}" class="text-blue-600 underline hover:text-blue-800 font-bold">` 
                    : `<span class="text-gray-400 underline cursor-not-allowed">`;
                const linkTagClose = isActive ? `</a>` : `</span>`;

                // 実施ボタンのHTML生成
                const btnHtml = isActive
                    ? `<a href="${test.link}" class="inline-block border border-gray-400 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-1 rounded text-xs font-bold transition">テスト実施</a>`
                    : `<button disabled class="border border-gray-200 bg-gray-50 text-gray-300 px-4 py-1 rounded text-xs cursor-not-allowed">テスト実施</button>`;

                tr.innerHTML = `
                    <td class="border border-gray-300 p-2 text-left pl-4 whitespace-nowrap">
                        ${linkTagOpen}${test.name}${linkTagClose}
                    </td>
                    <td class="border border-gray-300 p-2 whitespace-nowrap">
                        <span class="inline-block text-white text-xs px-3 py-1 rounded ${statusClass}">
                            ${statusLabel}
                        </span>
                    </td>
                    <td class="border border-gray-300 p-2 text-gray-600 whitespace-nowrap">
                        ${test.passScore}
                    </td>
                    <td class="border border-gray-300 p-2 whitespace-nowrap">
                        ${btnHtml}
                    </td>
                `;

                tbody.appendChild(tr);
            });

            // ページネーションの件数表示を更新
            paginationInfo.textContent = `${currentData.length}件 (1/1)`;
        }

        // タブをクリックしたときに呼ばれる関数
        function switchTab(tabId) {
            currentTab = tabId;
            
            // すべてのタブの装飾を非アクティブ（グレー）にリセット
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('text-gray-800', 'border-blue-600');
                btn.classList.add('text-gray-500', 'border-transparent');
            });
            
            // クリックされたタブをアクティブ（青線・黒文字）にする
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('text-gray-500', 'border-transparent');
            activeBtn.classList.add('text-gray-800', 'border-blue-600');
            
            // 総合テストタブの場合のみ説明書きを表示
            const descEl = document.getElementById('comprehensive-desc');
            if (tabId === 'comprehensive') {
                descEl.classList.remove('hidden');
            } else {
                descEl.classList.add('hidden');
            }
            
            // テーブルを再描画
            renderTable();
        }

        // ページ読み込み時の初期描画
        renderTable();
    </script>
</body>
</html>
