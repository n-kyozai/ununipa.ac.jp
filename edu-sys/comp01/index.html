<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育制度論 対策テスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ヘッダーやアクセントのカラー（テスト一覧に合わせる） */
        .header-bg { background-color: #005662; }
        
        /* ドロワーメニューのアニメーション用 */
        #drawer { transition: transform 0.3s ease-in-out; }
        .drawer-open { transform: translateX(0); }
        .drawer-closed { transform: translateX(-100%); }

        /* タイマー枠固定・ガタつき防止 */
        .timer-fixed {
            font-variant-numeric: tabular-nums; /* 数字の幅を等幅にする */
            min-width: 5rem; /* 枠の幅を固定 */
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- ヘッダー -->
    <header class="header-bg text-white p-4 flex justify-between items-center fixed w-full z-30 top-0 shadow-md">
        <div class="flex items-center gap-3">
            <!-- ハンバーガーボタン -->
            <button id="menu-btn" class="p-2 text-white focus:outline-none hover:bg-white hover:bg-opacity-20 rounded transition" aria-label="メニューを開く">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <h1 class="text-lg md:text-xl font-bold">教育制度論 対策</h1>
        </div>
        <a href="https://n-kyozai.github.io/ununipa.ac.jp/edu-sys/index.html" class="text-sm underline hover:text-gray-300 transition">テスト一覧へ</a>
    </header>

    <!-- ドロワーメニュー -->
    <div id="drawer" class="drawer-closed fixed top-0 left-0 h-full w-64 bg-white shadow-2xl z-40 pt-16 flex flex-col">
        <div class="p-4 bg-gray-100 border-b flex justify-between items-center">
            <span class="font-bold text-gray-700">問題リスト</span>
            <button id="close-drawer-btn" class="text-gray-500 hover:text-gray-800 font-bold p-2">&times;</button>
        </div>
        <ul id="drawer-list" class="p-4 flex-grow overflow-y-auto space-y-2">
            <!-- JSで問題リストが生成されます -->
        </ul>
    </div>
    <!-- ドロワー用オーバーレイ（背景の暗転） -->
    <div id="drawer-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 pt-16"></div>

    <!-- メインコンテンツ -->
    <main class="flex-grow pt-20 p-4 w-full max-w-3xl mx-auto flex flex-col items-center">
        
        <!-- ================= スタート画面 ================= -->
        <div id="start-screen" class="bg-white p-6 md:p-10 rounded-lg shadow-lg w-full mt-4">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6 border-b-2 border-blue-500 pb-2 inline-block w-full">総合テスト開始</h2>
            
            <div class="mb-8">
                <p class="text-gray-600 mb-4 font-bold">出題形式を選択してください</p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <label class="flex-1 cursor-pointer border-2 border-gray-200 rounded-lg p-4 flex items-center hover:bg-blue-50 transition">
                        <input type="radio" name="test-mode" value="written" class="form-radio h-5 w-5 text-blue-600" checked>
                        <span class="ml-3 font-bold text-gray-700">記述式（入力）</span>
                    </label>
                    <label class="flex-1 cursor-pointer border-2 border-gray-200 rounded-lg p-4 flex items-center hover:bg-blue-50 transition">
                        <input type="radio" name="test-mode" value="choice" class="form-radio h-5 w-5 text-blue-600">
                        <span class="ml-3 font-bold text-gray-700">選択式（ドロップダウン）</span>
                    </label>
                </div>
                <p class="text-sm text-gray-500 mt-3">※ 問題はランダムな順番で出題されます。</p>
            </div>

            <div class="text-center">
                <button id="start-btn" class="bg-[#005662] hover:bg-[#00424b] text-white font-bold py-3 px-12 rounded-full shadow-md transition-colors text-lg">
                    テストを開始する
                </button>
            </div>
        </div>

        <!-- ================= テスト画面 ================= -->
        <div id="test-screen" class="hidden bg-white p-5 md:p-8 rounded-lg shadow-lg w-full mt-4">
            <!-- 情報ヘッダー -->
            <div class="flex justify-between items-center mb-6 pb-2 border-b border-gray-200">
                <div>
                    <span id="progress-info" class="text-sm font-bold text-blue-600 bg-blue-100 px-3 py-1 rounded-full">問 1 / 3</span>
                    <h2 id="question-title" class="text-xl font-bold mt-2 text-gray-800"></h2>
                </div>
                <!-- タイマー（枠固定） -->
                <div class="bg-gray-800 text-white px-3 py-2 rounded-lg flex flex-col items-center shadow-inner">
                    <span class="text-xs text-gray-300">TIME</span>
                    <div id="timer-display" class="font-mono text-xl md:text-2xl font-bold timer-fixed text-center">00:00</div>
                </div>
            </div>

            <!-- 問題文エリア -->
            <div id="question-area" class="text-base md:text-lg leading-relaxed text-gray-700 mb-8 py-4">
                <!-- JSで問題文と入力欄が生成されます -->
            </div>

            <!-- アクションエリア -->
            <div class="text-center">
                <div id="result-message" class="mb-4 font-bold text-lg h-8"></div>
                
                <button id="check-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-10 rounded shadow transition-colors text-lg">
                    判定する
                </button>
                <button id="next-btn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-10 rounded shadow transition-colors text-lg">
                    次の問題へ
                </button>
            </div>
        </div>

        <!-- ================= 結果画面 ================= -->
        <div id="result-screen" class="hidden bg-white p-6 md:p-10 rounded-lg shadow-lg w-full mt-4 text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">テスト完了！</h2>
            <div class="bg-gray-100 p-6 rounded-lg mb-8 inline-block">
                <p class="text-gray-600 mb-2">クリアタイム</p>
                <p id="final-time" class="font-mono text-4xl font-bold text-[#005662]">00:00</p>
            </div>
            
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button id="retry-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded shadow transition-colors">
                    設定に戻ってやり直す
                </button>
                <a href="https://n-kyozai.github.io/ununipa.ac.jp/edu-sys/index.html" class="bg-[#005662] hover:bg-[#00424b] text-white font-bold py-3 px-6 rounded shadow transition-colors inline-block">
                    テスト一覧へ戻る
                </a>
            </div>
        </div>

    </main>

    <script>
        // --- データ定義 ---
        // {0}, {1} の部分が穴埋めになります
        const originalQuestions = [
            {
                id: "q1",
                title: "日本国憲法 26条 第1項",
                text: "すべて国民は、法律の定めるところにより、その{0}に応じて、{1}教育を受ける権利を有する。",
                answers: ["能力", "ひとしく"]
            },
            {
                id: "q2",
                title: "日本国憲法 26条 第2項",
                text: "すべて国民は、法律の定めるところにより、その保護する{0}に{1}教育を受けさせる義務を負ふ。{2}教育は、これを{3}とする。",
                answers: ["子女", "普通", "義務", "無償"]
            },
            {
                id: "q3",
                title: "教育基本法 5条",
                text: "国民は、その保護する子に、別に法律で定めるところにより、{0}を受けさせる義務を負う。",
                answers: ["普通教育"]
            }
        ];

        // 選択式用のダミー選択肢プール
        const dummyChoices = [
            "能力", "ひとしく", "子女", "普通", "義務", "無償", "普通教育", 
            "個性", "平等", "児童", "専門", "権利", "有償", "国民", "人間性", "保護者"
        ];

        // --- 状態管理 ---
        let currentQuestions = [];
        let currentIndex = 0;
        let testMode = 'written'; // 'written' | 'choice'
        let timerInterval;
        let timeElapsed = 0;
        let isAnswered = false; // 現在の問題を正解したか

        // --- DOM要素 ---
        const ui = {
            drawer: document.getElementById('drawer'),
            drawerOverlay: document.getElementById('drawer-overlay'),
            menuBtn: document.getElementById('menu-btn'),
            closeDrawerBtn: document.getElementById('close-drawer-btn'),
            drawerList: document.getElementById('drawer-list'),
            startScreen: document.getElementById('start-screen'),
            testScreen: document.getElementById('test-screen'),
            resultScreen: document.getElementById('result-screen'),
            startBtn: document.getElementById('start-btn'),
            progressInfo: document.getElementById('progress-info'),
            questionTitle: document.getElementById('question-title'),
            questionArea: document.getElementById('question-area'),
            checkBtn: document.getElementById('check-btn'),
            nextBtn: document.getElementById('next-btn'),
            resultMessage: document.getElementById('result-message'),
            timerDisplay: document.getElementById('timer-display'),
            finalTime: document.getElementById('final-time'),
            retryBtn: document.getElementById('retry-btn')
        };

        // --- ユーティリティ関数 ---
        // 配列をシャッフルする
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 時間を MM:SS にフォーマット
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // --- ドロワーメニュー制御 ---
        function toggleDrawer(forceClose = false) {
            const isOpen = ui.drawer.classList.contains('drawer-open');
            if (isOpen || forceClose) {
                ui.drawer.classList.remove('drawer-open');
                ui.drawer.classList.add('drawer-closed');
                ui.drawerOverlay.classList.add('hidden');
            } else {
                ui.drawer.classList.remove('drawer-closed');
                ui.drawer.classList.add('drawer-open');
                ui.drawerOverlay.classList.remove('hidden');
            }
        }

        ui.menuBtn.addEventListener('click', () => toggleDrawer());
        ui.closeDrawerBtn.addEventListener('click', () => toggleDrawer(true));
        ui.drawerOverlay.addEventListener('click', () => toggleDrawer(true));

        // ドロワー内のリストを生成
        function updateDrawerList() {
            ui.drawerList.innerHTML = '';
            currentQuestions.forEach((q, index) => {
                const li = document.createElement('li');
                // 現在選択中の問題はハイライト
                const activeClass = index === currentIndex ? 'bg-blue-100 border-l-4 border-blue-500 font-bold' : 'hover:bg-gray-100';
                li.className = `p-3 rounded cursor-pointer transition-colors text-sm text-gray-700 ${activeClass}`;
                li.textContent = `問${index + 1}: ${q.title}`;
                li.addEventListener('click', () => {
                    currentIndex = index;
                    renderQuestion();
                    toggleDrawer(true); // 問題を選んだら自動で閉じる
                });
                ui.drawerList.appendChild(li);
            });
        }

        // --- テスト進行制御 ---

        // タイマー開始
        function startTimer() {
            clearInterval(timerInterval);
            timeElapsed = 0;
            ui.timerDisplay.textContent = "00:00";
            timerInterval = setInterval(() => {
                timeElapsed++;
                ui.timerDisplay.textContent = formatTime(timeElapsed);
            }, 1000);
        }

        // タイマー停止
        function stopTimer() {
            clearInterval(timerInterval);
        }

        // テスト開始
        ui.startBtn.addEventListener('click', () => {
            // 設定の取得
            const selectedMode = document.querySelector('input[name="test-mode"]:checked').value;
            testMode = selectedMode;

            // 問題をランダムにシャッフル
            currentQuestions = shuffleArray(originalQuestions);
            currentIndex = 0;

            // 画面の切り替え
            ui.startScreen.classList.add('hidden');
            ui.resultScreen.classList.add('hidden');
            ui.testScreen.classList.remove('hidden');

            startTimer();
            renderQuestion();
        });

        // リトライ処理
        ui.retryBtn.addEventListener('click', () => {
            ui.resultScreen.classList.add('hidden');
            ui.startScreen.classList.remove('hidden');
            stopTimer();
            ui.timerDisplay.textContent = "00:00";
        });

        // 問題の描画
        function renderQuestion() {
            isAnswered = false;
            const q = currentQuestions[currentIndex];
            
            ui.progressInfo.textContent = `問 ${currentIndex + 1} / ${currentQuestions.length}`;
            ui.questionTitle.textContent = q.title;
            ui.resultMessage.textContent = "";
            
            ui.checkBtn.classList.remove('hidden');
            ui.nextBtn.classList.add('hidden');

            let htmlContent = q.text;
            
            // 穴埋め部分の置換
            q.answers.forEach((ans, i) => {
                let inputElement = "";
                if (testMode === 'written') {
                    // 記述式
                    // autocomplete等をoffにして余計なキーボード予測を防ぐ
                    inputElement = `<input type="text" id="ans-${i}" class="answer-input border-b-2 border-gray-400 bg-blue-50 focus:border-blue-600 focus:bg-white outline-none px-2 py-1 mx-1 w-24 md:w-32 text-center transition-colors text-gray-800 font-bold" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">`;
                } else {
                    // 選択式
                    // 正解＋ダミー数個を抽出してシャッフル
                    let optionsPool = dummyChoices.filter(d => d !== ans);
                    optionsPool = shuffleArray(optionsPool).slice(0, 4); // ダミー4つ
                    const choices = shuffleArray([ans, ...optionsPool]);
                    
                    let optionsHtml = `<option value="">選択</option>`;
                    choices.forEach(c => {
                        optionsHtml += `<option value="${c}">${c}</option>`;
                    });
                    inputElement = `<select id="ans-${i}" class="answer-input border-2 border-gray-300 rounded px-2 py-1 mx-1 bg-white cursor-pointer font-bold text-gray-700 outline-none focus:border-blue-500">${optionsHtml}</select>`;
                }
                htmlContent = htmlContent.replace(`{${i}}`, inputElement);
            });

            ui.questionArea.innerHTML = htmlContent;
            
            // ドロワーリストのハイライト更新
            updateDrawerList();

            // 注意: 勝手にキーボードが出ないように、input要素への focus() はあえて行いません。
        }

        // 正誤判定
        ui.checkBtn.addEventListener('click', () => {
            const q = currentQuestions[currentIndex];
            let allCorrect = true;

            q.answers.forEach((ans, i) => {
                const el = document.getElementById(`ans-${i}`);
                const userAns = el.value.trim();

                // クラスのリセット
                el.classList.remove('border-red-500', 'bg-red-100', 'text-red-700', 'border-green-500', 'bg-green-100', 'text-green-800');

                if (userAns === ans) {
                    el.classList.add('border-green-500', 'bg-green-100', 'text-green-800');
                    if(testMode === 'written') el.classList.remove('border-gray-400', 'bg-blue-50');
                    if(testMode === 'choice') el.classList.remove('border-gray-300');
                    el.disabled = true; // 正解した欄はロック
                } else {
                    el.classList.add('border-red-500', 'bg-red-100', 'text-red-700');
                    allCorrect = false;
                }
            });

            if (allCorrect) {
                ui.resultMessage.textContent = "✅ 正解！";
                ui.resultMessage.className = "mb-4 font-bold text-xl text-green-600";
                ui.checkBtn.classList.add('hidden');
                ui.nextBtn.classList.remove('hidden');
                isAnswered = true;

                // 最終問題の場合はボタンのテキストを変更
                if (currentIndex === currentQuestions.length - 1) {
                    ui.nextBtn.textContent = "結果を見る";
                    ui.nextBtn.classList.replace('bg-blue-600', 'bg-yellow-500');
                    ui.nextBtn.classList.replace('hover:bg-blue-700', 'hover:bg-yellow-600');
                } else {
                    ui.nextBtn.textContent = "次の問題へ";
                    ui.nextBtn.classList.replace('bg-yellow-500', 'bg-blue-600');
                    ui.nextBtn.classList.replace('hover:bg-yellow-600', 'hover:bg-blue-700');
                }
            } else {
                ui.resultMessage.textContent = "❌ 不正解の箇所があります。直して再度判定してください。";
                ui.resultMessage.className = "mb-4 font-bold text-base md:text-lg text-red-600";
            }
        });

        // 次へ進む / 結果表示
        ui.nextBtn.addEventListener('click', () => {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                // テスト完了
                stopTimer();
                ui.testScreen.classList.add('hidden');
                ui.resultScreen.classList.remove('hidden');
                ui.finalTime.textContent = formatTime(timeElapsed);
                // ドロワーも一旦リセットしておく
                ui.drawerList.innerHTML = '';
            }
        });

    </script>
</body>
</html>
