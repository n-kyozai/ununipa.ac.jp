<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育法規のふりかえりテスト - 第2回</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ベースとなる青色（第1回のカラー） */
        .theme-bg { background-color: #005682; }
        .theme-text { color: #005682; }
        /* 選択状態用の明るめの青 */
        .theme-bg-light { background-color: #bfdbfe; border-color: #60a5fa; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen pb-10">

    <!-- スタート画面 -->
    <div id="start-screen" class="max-w-5xl mx-auto p-4 pt-8">
        <div class="bg-white border border-gray-300 shadow-sm mb-6">
            <table class="w-full text-sm border-collapse">
                <tbody>
                    <tr><th class="w-1/4 theme-bg text-white p-3 border border-gray-300 text-left">テストグループ</th><td class="p-3 border border-gray-300"></td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト名</th><td class="p-3 border border-gray-300 font-bold">第2回課題</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト説明</th><td class="p-3 border border-gray-300">今週までの教育法規のふりかえり。<br>何回でもできる設定にしているので、必ず満点にすること。</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">満点</th><td class="p-3 border border-gray-300">5点</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">合格点数</th><td class="p-3 border border-gray-300">5点</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト時間</th><td class="p-3 border border-gray-300">2分</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">問題表示区分</th><td class="p-3 border border-gray-300">一問題表示</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">問題出題形式</th><td class="p-3 border border-gray-300">ランダム</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">再テスト可否区分</th><td class="p-3 border border-gray-300">合格後も可</td></tr>
                </tbody>
            </table>
        </div>
        <div class="text-center mt-8 flex justify-center gap-4">
            <a href="https://n-kyozai.github.io/ununipa.ac.jp/edu-sys/index.html" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-8 rounded shadow transition duration-200 inline-block">テスト一覧へ</a>
            <button id="start-btn" class="theme-bg hover:bg-blue-800 text-white font-bold py-3 px-12 rounded shadow transition duration-200">テスト開始</button>
        </div>
    </div>

    <!-- テスト画面 -->
    <div id="test-screen" class="hidden max-w-5xl mx-auto p-4 flex flex-col md:flex-row gap-6">
        
        <!-- オーバーレイ背景（モバイル用） -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden transition-opacity"></div>

        <!-- 左側：問題リスト（モバイル時はスライドドロワー、PC時は固定表示） -->
        <div id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out md:block w-64 md:w-48 bg-gray-100 md:bg-transparent z-50 p-4 md:p-0 shadow-xl md:shadow-none overflow-y-auto shrink-0 border-r border-gray-300 md:border-none">
            <!-- モバイル用の閉じるボタンとタイトル -->
            <div class="flex justify-between items-center md:hidden mb-4 border-b border-gray-300 pb-2">
                <span class="font-bold text-gray-700">問題一覧</span>
                <button id="close-sidebar-btn" class="text-gray-500 hover:text-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="question-nav-list" class="flex flex-col gap-1">
                <!-- JSで生成 -->
            </div>
        </div>

        <!-- 右側：問題エリア -->
        <div class="flex-grow w-full md:w-auto">
            <div class="flex justify-between items-center mb-4 bg-gray-200 p-3 rounded border border-gray-300">
                <div class="flex items-center gap-3">
                    <!-- モバイル用ハンバーガーボタン -->
                    <button id="open-sidebar-btn" class="md:hidden text-gray-600 hover:text-gray-900 focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div class="font-bold text-gray-700 truncate">第2回課題</div>
                </div>
                <div id="timer-display" class="text-gray-800 font-bold text-lg bg-white px-3 py-1 rounded shadow-sm border border-gray-300 w-40 text-center shrink-0 whitespace-nowrap">残り時間 2:00</div>
            </div>
            
            <div class="border border-gray-300 rounded shadow-sm bg-white mb-6">
                <div id="question-number" class="bg-blue-100 px-4 py-3 border-b border-gray-300 text-gray-800 font-bold">
                    <!-- 問題番号 -->
                </div>
                <div class="p-6">
                    <p id="question-text" class="text-lg mb-8 leading-relaxed"></p>
                    <div class="mb-4 bg-gray-50 p-4 border rounded" id="input-container">
                        <!-- JSで入力欄（テキストまたはプルダウン）を生成 -->
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center border-t pt-4">
                <button id="prev-btn" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-6 rounded transition disabled:opacity-50 disabled:cursor-not-allowed">前へ</button>
                <div class="flex items-center">
                    <span id="progress-text" class="mr-6 text-gray-600 font-bold">1 / 5</span>
                    <button id="next-btn" class="theme-bg hover:bg-blue-800 text-white font-bold py-2 px-6 rounded transition">次へ</button>
                    <button id="finish-btn" class="hidden bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-2 px-6 rounded shadow transition">テスト提出</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 採点結果画面 -->
    <div id="result-screen" class="hidden max-w-5xl mx-auto p-4">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-blue-800 pb-2">採点結果</h2>
        
        <div class="bg-white border border-gray-300 rounded shadow-sm p-6 mb-8 text-center">
            <p class="text-lg text-gray-600 mb-2">あなたの得点</p>
            <p id="total-score" class="text-5xl font-bold theme-text mb-2">0点 / 5点</p>
            <p id="pass-status" class="text-xl font-bold"></p>
        </div>

        <div id="result-list" class="space-y-8">
            <!-- JSで結果を生成 -->
        </div>

        <div class="text-center mt-12 mb-8">
            <button id="retry-btn" class="theme-bg hover:bg-blue-800 text-white font-bold py-3 px-12 rounded shadow transition duration-200">もう一度テストを行う（再テスト）</button>
        </div>
    </div>

    <!-- 確認モーダル -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded shadow-lg max-w-sm w-full mx-4">
            <p class="mb-6 text-center text-lg font-bold text-gray-800">テストを提出して採点しますか？</p>
            <div class="flex justify-center gap-4">
                <button id="modal-cancel-btn" class="px-6 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition font-bold">いいえ</button>
                <button id="modal-ok-btn" class="px-6 py-2 bg-yellow-400 text-gray-900 rounded hover:bg-yellow-500 transition font-bold">はい</button>
            </div>
        </div>
    </div>

    <script>
        // 問題データ（第2回）
        // type: 'text' は記述式、'select' はプルダウン式
        const originalQuestions = [
            { 
                id: 1, 
                type: "text",
                text: "小学校の教育課程に関する事項は、第二十九条及び第三十条の規定に従い、（　　　）が定める。", 
                answer: "文部科学大臣" 
            },
            { 
                id: 2, 
                type: "text",
                text: "すべて国民は、法律の定めるところにより、その保護する子に（　　　）教育を受けさせる義務を負ふ。", 
                answer: "普通" 
            },
            { 
                id: 3, 
                type: "text",
                text: "国は、全国的な教育の（　　　）と教育水準の維持向上を図るため、教育に関する施策を総合的に策定し、実施しなければならない", 
                answer: "機会均等" 
            },
            { 
                id: 4, 
                type: "text",
                text: "小学校においては、文部科学大臣の（　　　）を経た教科用図書又は文部科学省が著作の名義を有する教科用図書を使用しなければならない。", 
                answer: "検定" 
            },
            { 
                id: 5, 
                type: "select",
                text: "国は、毎年度、各都道府県ごとに、公立の小学校、中学校、義務教育学校、中等教育学校の前期課程並びに特別支援学校の小学部及び中学部に要する経費のうち、次に掲げるものについて、その実支出額の（　　　）を負担する。", 
                options: ["選択してください", "二分の一", "三分の一", "三分の二", "四分の一", "四分の三"],
                answer: "三分の一" 
            }
        ];

        // 状態変数
        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {}; // { questionId: "ユーザーの入力/選択" }
        let timeLeft = 120; // 制限時間2分（120秒）
        let timerInterval = null;
        let currentInputElement = null; // 現在の入力要素（input または select）

        // DOM要素
        const startScreen = document.getElementById('start-screen');
        const testScreen = document.getElementById('test-screen');
        const resultScreen = document.getElementById('result-screen');
        const inputContainer = document.getElementById('input-container');
        const questionNavList = document.getElementById('question-nav-list');
        const confirmModal = document.getElementById('confirm-modal');
        
        // サイドバー用DOM要素
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const openSidebarBtn = document.getElementById('open-sidebar-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');

        // 配列をシャッフルする関数（ランダム出題用）
        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        // テスト開始処理
        function startTest() {
            questions = shuffleArray(originalQuestions);
            currentQuestionIndex = 0;
            userAnswers = {};
            timeLeft = 120;
            
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            testScreen.classList.remove('hidden');

            renderNavList();
            renderQuestion();
            startTimer();
        }

        // 左側の問題ナビゲーション
        function renderNavList() {
            questionNavList.innerHTML = '';
            questions.forEach((_, index) => {
                const navItem = document.createElement('div');
                navItem.className = `p-2 border rounded font-bold text-center cursor-pointer transition-colors ${index === currentQuestionIndex ? 'theme-bg-light text-blue-900 border-blue-400' : 'bg-gray-200 border-gray-300 hover:bg-gray-300'}`;
                navItem.innerText = `【問題${index + 1}】`;
                
                navItem.addEventListener('click', () => {
                    if (currentQuestionIndex !== index) {
                        saveAnswer();
                        currentQuestionIndex = index;
                        renderQuestion();
                    }
                    closeSidebar(); // モバイル時はメニューを選択後に閉じる
                });

                questionNavList.appendChild(navItem);
            });
        }

        // 問題の表示（テキスト入力 or プルダウンを切り替え）
        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-number').innerText = `【問題${currentQuestionIndex + 1}】（1点）`;
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;

            // 入力欄の生成
            inputContainer.innerHTML = '';
            const label = document.createElement('label');
            label.className = 'block text-sm font-bold text-gray-700 mb-2';
            label.innerText = '（　　　）に入る言葉を解答してください：';
            inputContainer.appendChild(label);

            if (q.type === 'select') {
                currentInputElement = document.createElement('select');
                currentInputElement.className = 'shadow-sm border border-gray-400 rounded w-full md:w-1/2 py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 bg-white cursor-pointer';
                
                q.options.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt === "選択してください" ? "" : opt;
                    option.innerText = opt;
                    currentInputElement.appendChild(option);
                });
            } else {
                currentInputElement = document.createElement('input');
                currentInputElement.type = 'text';
                currentInputElement.autocomplete = 'off';
                currentInputElement.className = 'shadow-sm appearance-none border border-gray-400 rounded w-full md:w-1/2 py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600';
                
                // Enterキーで次へ進む補助機能（テキスト入力のみ）
                currentInputElement.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (currentQuestionIndex < questions.length - 1) {
                            document.getElementById('next-btn').click();
                        } else {
                            document.getElementById('finish-btn').click();
                        }
                    }
                });
            }

            // 保存されている解答をセットし、イベントリスナー追加
            currentInputElement.value = userAnswers[q.id] || "";
            currentInputElement.addEventListener('change', saveAnswer);
            currentInputElement.addEventListener('input', saveAnswer); // テキスト入力用
            inputContainer.appendChild(currentInputElement);
            
            // 修正点: スマホ等で自動的にキーボードがせり上がるのを防ぐため focus() を削除
            // if (q.type === 'text') {
            //     currentInputElement.focus();
            // }

            // ナビゲーションの色更新
            Array.from(questionNavList.children).forEach((el, idx) => {
                if (idx === currentQuestionIndex) {
                    el.className = 'p-2 border rounded font-bold text-center cursor-pointer transition-colors theme-bg-light text-blue-900 border-blue-400';
                } else {
                    el.className = 'p-2 border rounded font-bold text-center cursor-pointer transition-colors bg-gray-200 border-gray-300 hover:bg-gray-300';
                }
            });

            // ボタンの表示切り替え
            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === questions.length - 1) {
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('finish-btn').classList.remove('hidden');
            } else {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('finish-btn').classList.add('hidden');
            }
        }

        // 解答の保存
        function saveAnswer() {
            if (!currentInputElement) return;
            const qId = questions[currentQuestionIndex].id;
            userAnswers[qId] = currentInputElement.value;
        }

        // サイドバー開閉処理（モバイル用）
        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        }

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }

        openSidebarBtn.addEventListener('click', openSidebar);
        closeSidebarBtn.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        // タイマー処理
        function updateTimerDisplay() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            document.getElementById('timer-display').innerText = `残り時間 ${min}:${sec.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    saveAnswer();
                    executeScoring();
                }
            }, 1000);
        }

        // 採点と結果表示
        function executeScoring() {
            if (timerInterval) clearInterval(timerInterval);
            
            testScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            confirmModal.classList.add('hidden');

            let score = 0;
            const resultContainer = document.getElementById('result-list');
            resultContainer.innerHTML = '';

            questions.forEach((q, index) => {
                const userAnswer = (userAnswers[q.id] || "").trim();
                const isCorrect = userAnswer === q.answer;
                
                if (isCorrect) score++;

                const itemHtml = `
                    <div class="border border-gray-300 rounded shadow-sm bg-white overflow-hidden">
                        <div class="bg-blue-50 px-4 py-2 border-b border-gray-300 text-gray-800 font-bold flex items-center">
                            ${isCorrect ? '<span class="text-red-600 font-bold text-xl mr-2">○</span>' : '<span class="text-blue-600 font-bold text-xl mr-2">×</span>'}
                            【問題${index + 1}】（1点）
                        </div>
                        <div class="p-4 md:p-6">
                            <p class="mb-6 text-gray-800">${q.text}</p>
                            <table class="w-full border-collapse text-sm">
                                <tbody>
                                    <tr>
                                        <th class="w-1/3 md:w-1/4 theme-bg text-white p-2 border border-gray-300 text-left">正解</th>
                                        <td class="p-2 border border-gray-300 font-bold">${q.answer}</td>
                                    </tr>
                                    <tr>
                                        <th class="theme-bg text-white p-2 border border-gray-300 text-left">学習者解答</th>
                                        <td class="p-2 border border-gray-300 ${isCorrect ? '' : 'text-red-600 font-bold'}">${userAnswer === "" ? "<span class='text-gray-400'>未解答</span>" : userAnswer}</td>
                                    </tr>
                                    <tr>
                                        <th class="theme-bg text-white p-2 border border-gray-300 text-left">点数</th>
                                        <td class="p-2 border border-gray-300">${isCorrect ? '1' : '0'}点／1点</td>
                                    </tr>
                                    <tr>
                                        <th class="theme-bg text-white p-2 border border-gray-300 text-left">問題解説</th>
                                        <td class="p-2 border border-gray-300 text-gray-500"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                resultContainer.insertAdjacentHTML('beforeend', itemHtml);
            });

            document.getElementById('total-score').innerText = `${score}点 / ${questions.length}点`;
            
            const passStatus = document.getElementById('pass-status');
            if (score === questions.length) {
                passStatus.innerText = "合格！満点です。";
                passStatus.className = "text-xl font-bold text-green-600";
            } else {
                passStatus.innerText = "不合格。満点を目指して再テストしましょう。";
                passStatus.className = "text-xl font-bold text-red-600";
            }
        }

        // イベントリスナーの設定
        document.getElementById('start-btn').addEventListener('click', startTest);
        
        document.getElementById('retry-btn').addEventListener('click', () => {
            startScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            saveAnswer();
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            saveAnswer();
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        });

        document.getElementById('finish-btn').addEventListener('click', () => {
            saveAnswer();
            confirmModal.classList.remove('hidden');
        });

        document.getElementById('modal-cancel-btn').addEventListener('click', () => {
            confirmModal.classList.add('hidden');
        });

        document.getElementById('modal-ok-btn').addEventListener('click', () => {
            executeScoring();
        });

    </script>
</body>
</html>
