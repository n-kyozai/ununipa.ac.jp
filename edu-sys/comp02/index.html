<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ヘッダーやアクセントのカラー */
        .header-bg { background-color: #005b82; }
        
        /* タイマー枠の固定 */
        .timer-box {
            font-variant-numeric: tabular-nums;
        }

        /* 記述式の入力欄スタイル */
        .blank-input {
            border: 1px solid #cbd5e1;
            background-color: #fff;
            padding: 8px 12px;
            width: 100%;
            max-width: 400px;
            border-radius: 4px;
            outline: none;
            font-size: 1rem;
            color: #333;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .blank-input:focus {
            border-color: #005b82;
            box-shadow: 0 0 0 2px rgba(0, 91, 130, 0.2);
        }

        /* 選択式のセレクトボックススタイル */
        .blank-select {
            border: 1px solid #cbd5e1;
            background-color: #fff;
            padding: 8px 32px 8px 12px;
            width: 100%;
            max-width: 400px;
            border-radius: 4px;
            outline: none;
            font-size: 1rem;
            color: #333;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            transition: border-color 0.2s;
        }
        .blank-select:focus {
            border-color: #005b82;
        }
    </style>
</head>
<body class="bg-[#e8ecef] text-gray-800 font-sans min-h-screen flex flex-col">

                </div>
                <div class="flex border-b border-gray-300">

                </div>

                <div class="flex border-b border-gray-300">

                    <div id="display-test-time" class="w-2/3 md:w-3/4 p-3">計算中...</div>

                <div class="flex border-b border-gray-300">

                    <div class="w-2/3 md:w-3/4 p-3">一問題表示</div>
                </div>
                <div class="flex border-b border-gray-300">

            <div class="flex justify-center gap-4">

                            <div id="input-area">
                                <!-- JSで input/select を挿入 -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- フッターナビゲーション -->
                <div class="flex justify-between items-center mt-2">
                    <button id="prev-btn" class="bg-[#94a3b8] hover:bg-[#64748b] text-white font-bold py-2 px-8 rounded shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed">

                <div class="flex justify-center gap-4">
                    <button id="modal-cancel-btn" class="bg-[#cbd5e1] hover:bg-[#94a3b8] text-gray-800 font-bold py-2.5 px-8 rounded transition">
                        いいえ
                    </button>
                    <button id="modal-submit-btn" class="bg-[#fbbf24] hover:bg-[#f59e0b] text-gray-900 font-bold py-2.5 px-8 rounded transition">
                        はい
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= 結果画面 ================= -->
        <section id="result-screen" class="hidden">
            <div class="bg-white rounded-lg shadow-md p-6 md:p-10 text-center mb-6 border border-gray-200">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">テスト結果</h2>
                <div class="text-5xl font-bold text-[#005b82] mb-4" id="score-display">
                    -- / --
                </div>
                <p id="time-taken" class="text-gray-600 mb-6 font-medium">残り時間: --:--</p>
            </div>

            <div class="bg-white rounded-lg shadow-md p-4 md:p-8 mb-8 border border-gray-200">

            <div class="flex justify-center gap-4">

                    テスト一覧へ
                </a>
                <button onclick="location.reload();" class="header-bg hover:bg-[#00476b] text-white font-bold py-3 px-8 rounded shadow transition">
                    もう一度挑戦する
                </button>
            </div>
        </section>

    </main>

            els.qCountSelect.addEventListener('change', updateStartScreen);

            // イベントリスナー登録
            document.getElementById('start-btn').addEventListener('click', startTest);
            
            els.prevBtn.addEventListener('click', () => navigateQuestion(-1));
            els.nextBtn.addEventListener('click', () => navigateQuestion(1));

            els.submitConfirmBtn.addEventListener('click', () => {

                els.submitModal.classList.add('hidden');
            });
            els.modalSubmitBtn.addEventListener('click', () => {
                els.submitModal.classList.add('hidden');
                finishTest();
            });
            
            els.menuBtn.addEventListener('click', openDrawer);
            els.closeMenuBtn.addEventListener('click', closeDrawer);
            els.drawerOverlay.addEventListener('click', closeDrawer);
        }

        // --- スタート画面の表示更新 ---
        function updateStartScreen() {
            const val = els.qCountSelect.value;
            const count = val === 'all' ? baseQuestions.length : parseInt(val, 10);
            
            els.displayScore.textContent = `${count}点`;
            els.displayPassScore.textContent = `${count}点`;
            
            totalTimeLimit = count * TIME_PER_QUESTION;
            const minutes = Math.floor(totalTimeLimit / 60);
            const seconds = totalTimeLimit % 60;
            els.displayTestTime.textContent = `${minutes}分${seconds > 0 ? seconds + '秒' : ''}`;
        }

        // --- テスト開始処理 ---
        function startTest() {
            const modeRadios = document.getElementsByName('test-mode');
            for (const radio of modeRadios) {
                if (radio.checked) testMode = radio.value;
            }

            generateQuestions();

            if (parsedQuestions.length === 0) {
                alert("出題可能な問題がありません。");
                return;
            }

            screens.start.classList.add('hidden');
            screens.test.classList.remove('hidden');
            screens.test.classList.add('flex');

            currentQuestionIndex = 0;
            renderQuestion(currentQuestionIndex);
            updateNavigations();
            
            startTimer();
        }

        // --- 問題データの生成 ---
        function generateQuestions() {
            parsedQuestions = [];
            userAnswers = [];

            // すべての正解リスト（ダミー選択肢生成用）
            const allAnswersArray = Array.from(new Set(baseQuestions.map(q => q.correctAnswer)));

            const val = els.qCountSelect.value;
            const count = val === 'all' ? baseQuestions.length : parseInt(val, 10);

            // 問題をランダムにシャッフルして指定数取得
            const shuffledData = [...baseQuestions].sort(() => Math.random() - 0.5);
            const selectedData = shuffledData.slice(0, count);

            selectedData.forEach((q) => {
                let options = [];
                if (q.options) {
                    // 専用の選択肢（分数の問題など）が定義されていればそれを使用
                    options = [...q.options];
                } else {
                    // 定義がなければ正解＋ランダムなダミー3つで4択を作成
                    options = [q.correctAnswer];
                    const dummyOptions = allAnswersArray.filter(a => a !== q.correctAnswer).sort(() => Math.random() - 0.5);
                    options = options.concat(dummyOptions.slice(0, 3)); 
                    options.sort(() => Math.random() - 0.5); 
                }

                parsedQuestions.push({
                    title: q.title,
                    text: q.text,
                    correctAnswer: q.correctAnswer,
                    options: options,
                    forceSelect: q.forceSelect || false
                });
                
                userAnswers.push(""); 
            });
        }

        // --- 問題の描画 ---
        function renderQuestion(index) {
            const q = parsedQuestions[index];
            
            els.qNumberTitle.innerHTML = `【問題 ${index + 1}】<span class="text-sm ml-2 font-normal text-gray-700">（1点）</span>`;
            // プレースホルダー [HOLE] を（　　　）に置換して表示
            const displayText = q.text.replace('[HOLE]', `<span class="font-bold px-1">（　　　）</span>`).replace(/\n/g, '<br>');
            els.qBody.innerHTML = displayText;
            els.qProgress.textContent = `${index + 1} / ${parsedQuestions.length}`;

            // 解答枠の生成
            els.inputArea.innerHTML = '';
            
            // 記述式モードであっても、forceSelectがtrueならプルダウンを強制
            if (testMode === 'descriptive' && !q.forceSelect) {
                els.inputInstruction.textContent = "（　　　）に入る言葉を記述してください：";
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'blank-input';
                input.value = userAnswers[index];
                
                input.addEventListener('input', (e) => {
                    userAnswers[index] = e.target.value;
                    updateNavigations();
                });
                els.inputArea.appendChild(input);
            } else {
                els.inputInstruction.textContent = "（　　　）に入る言葉を選択してください：";
                const select = document.createElement('select');
                select.className = 'blank-select';
                
                const defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.textContent = "選択してください";
                select.appendChild(defaultOption);

                q.options.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    if (userAnswers[index] === opt) {
                        option.selected = true;
                    }
                    select.appendChild(option);
                });

                select.addEventListener('change', (e) => {
                    userAnswers[index] = e.target.value;
                    updateNavigations();
                });
                els.inputArea.appendChild(select);
            }

            // ボタンの表示制御
            els.prevBtn.disabled = index === 0;
            if (index === parsedQuestions.length - 1) {
                els.nextBtn.classList.add('hidden');
                els.submitConfirmBtn.classList.remove('hidden');
            } else {
                els.nextBtn.classList.remove('hidden');
                els.submitConfirmBtn.classList.add('hidden');
            }
        }

        function navigateQuestion(step) {
            const newIndex = currentQuestionIndex + step;
            if (newIndex >= 0 && newIndex < parsedQuestions.length) {
                currentQuestionIndex = newIndex;
                renderQuestion(currentQuestionIndex);
                updateNavigations(); 
            }
        }

        // --- UIの更新 ---
        function updateNavigations() {
            updateSidebarList();
            updateDrawerList();
        }

        function updateSidebarList() {
            els.desktopSidebar.innerHTML = '';
            parsedQuestions.forEach((q, idx) => {
                const button = document.createElement('button');
                const isActive = idx === currentQuestionIndex;
                
                let baseClass = "text-center px-4 py-2.5 rounded font-medium transition border text-sm md:text-base shadow-sm ";
                if (isActive) {
                    baseClass += "bg-[#bfdbfe] text-black border-[#93c5fd]"; 
                } else {
                    baseClass += "bg-[#e2e8f0] text-gray-700 border-[#cbd5e1] hover:bg-[#cbd5e1]";
                }
                
                button.className = baseClass;
                button.innerHTML = `【問題${idx + 1}】`;
                
                button.addEventListener('click', () => {
                    currentQuestionIndex = idx;
                    renderQuestion(currentQuestionIndex);
                    updateNavigations();
                });
                
                els.desktopSidebar.appendChild(button);
            });
        }

        function updateDrawerList() {
            els.drawerList.innerHTML = '';
            parsedQuestions.forEach((q, idx) => {
                const li = document.createElement('li');
                const isActive = idx === currentQuestionIndex;
                
                li.className = `p-3 mb-1 rounded cursor-pointer transition ${isActive ? 'bg-[#bfdbfe] font-bold text-black border border-[#93c5fd]' : 'bg-[#e2e8f0] border border-[#cbd5e1] hover:bg-[#cbd5e1] text-gray-700'}`;
                li.innerHTML = `<div class="text-center">【問題${idx + 1}】</div>`;
                
                li.addEventListener('click', () => {
                    currentQuestionIndex = idx;
                    renderQuestion(currentQuestionIndex);
                    closeDrawer(); 
                    updateNavigations();
                });
                
                els.drawerList.appendChild(li);
            });
        }

        function openDrawer() {
            els.drawerMenu.classList.remove('-translate-x-full');
            els.drawerOverlay.classList.remove('hidden');
        }

        function closeDrawer() {
            els.drawerMenu.classList.add('-translate-x-full');
            els.drawerOverlay.classList.add('hidden');
        }

        // --- タイマー処理 ---
        function startTimer() {
            timeLeft = totalTimeLimit; 
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 10) {
                    els.timerContainer.classList.add('text-red-600');
                    els.timerContainer.classList.remove('text-gray-800');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    els.submitModal.classList.add('hidden'); // モーダルが開いていれば閉じる
                    alert("制限時間終了です！自動的に採点します。");
                    finishTest();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(Math.max(0, timeLeft) / 60).toString().padStart(2, '0');
            const s = (Math.max(0, timeLeft) % 60).toString().padStart(2, '0');
            els.timerText.textContent = `${m}:${s}`;
        }

        function normalizeString(str) {
            if (!str) return "";
            return str.replace(/[\s　]/g, '').toLowerCase();
        }

        // --- テスト終了・採点処理 ---
        function finishTest() {
            clearInterval(timerInterval);
            
            let correctCount = 0;
            els.resultDetails.innerHTML = '';

            parsedQuestions.forEach((q, idx) => {
                const userAnswer = userAnswers[idx];
                const isCorrect = normalizeString(userAnswer) === normalizeString(q.correctAnswer);
                if (isCorrect) correctCount++;

                const resultCard = document.createElement('div');
                resultCard.className = `p-4 rounded border-l-4 ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`;
                
                const icon = isCorrect 
                    ? `<span class="text-green-600 font-bold text-lg">○ 正解</span>` 
                    : `<span class="text-red-600 font-bold text-lg">× 不正解</span>`;

                // 正解を埋め込んだテキストを生成
                const correctHtmlText = q.text.replace('[HOLE]', `<span class="font-bold border-b-2 border-gray-400 px-1 text-black">（ ${q.correctAnswer} ）</span>`).replace(/\n/g, '<br>');

                resultCard.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="font-bold text-gray-800">問題 ${idx + 1}: <span class="text-sm font-normal text-gray-600">${q.title}</span></h4>
                        ${icon}
                    </div>
                    <div class="text-sm text-gray-700 bg-white p-3 rounded border border-gray-200 mb-2">
                        ${correctHtmlText}
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm mt-2">
                        <div class="bg-white p-2 rounded border border-gray-100 shadow-sm">
                            <span class="text-gray-500 block text-xs">あなたの解答</span>
                            <span class="font-bold ${isCorrect ? 'text-green-700' : 'text-red-700'}">${userAnswer || '（未解答）'}</span>
                        </div>
                        <div class="bg-white p-2 rounded border border-gray-100 shadow-sm">
                            <span class="text-gray-500 block text-xs">正解</span>
                            <span class="font-bold text-blue-700">${q.correctAnswer}</span>
                        </div>
                    </div>
                `;
                els.resultDetails.appendChild(resultCard);
            });

            els.scoreDisplay.textContent = `${correctCount} / ${parsedQuestions.length}`;
            
            const timeTakenSec = totalTimeLimit - Math.max(0, timeLeft);
            const tm = Math.floor(timeTakenSec / 60);
            const ts = timeTakenSec % 60;
            els.timeTaken.textContent = `所要時間: ${tm}分 ${ts}秒`;

            screens.test.classList.add('hidden');
            screens.test.classList.remove('flex');
            screens.result.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
