<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テスト一覧メニュー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ヘッダーやアクセントのカラー（元コードの型を維持） */
        .header-bg { background-color: #005662; }
        .tab-bg { background-color: #e5f1f4; }
        .status-active { background-color: #a0c832; } /* テスト受付中（黄緑） */
        .status-prep { background-color: #4bc0c8; } /* テスト準備中（水色） */
    </style>
</head>
<body class="bg-white text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto overflow-hidden">
        <div class="flex-grow pb-6 overflow-y-auto">
            <h1 class="text-xl font-bold mb-4 pb-2 border-b border-gray-300 flex justify-between items-end">
                <span>経済史【新鞍 拓生】</span>
            </h1>

            <!-- テスト一覧テーブル -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm border-collapse border border-gray-300 text-center min-w-[500px]">
                    <thead class="bg-gray-100 text-gray-700 whitespace-nowrap">
                        <tr>
                            <th class="border border-gray-300 p-2 font-normal w-1/3">
                                <!-- 画像に合わせたソートアイコン風の表示 -->
                                <div class="flex items-center justify-center gap-1 cursor-pointer hover:bg-gray-200 p-1 rounded transition-colors inline-flex">
                                    テスト名
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 9l4-4 4 4m0 6l-4 4-4-4" />
                                    </svg>
                                </div>
                            </th>
                            <th class="border border-gray-300 p-3 font-normal">ステータス</th>
                            <th class="border border-gray-300 p-3 font-normal">満点</th>
                            <th class="border border-gray-300 p-3 font-normal">実施</th>
                        </tr>
                    </thead>
                    <tbody id="test-list-body">
                        <!-- ここにJavaScriptでリストが生成されます -->
                    </tbody>
                </table>
            </div>

            <!-- ページネーション -->
            <div class="bg-gray-200 p-2 mt-2 flex justify-center items-center text-sm text-gray-600 gap-4">
                <span>14件 (1/1)</span>
                <div class="flex gap-3">
                    <span class="text-gray-500">&lt;</span>
                    <span class="text-gray-700 font-bold">1</span>
                    <span class="text-gray-500">&gt;</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 【テストデータ】
         * 第1回授業の復習のみ実施中（active）とし、遷移先を index.html に設定。
         * 合格点数の列を満点表記（10点）に変更しています。
         */
        const testsData = [
            { id: 1, name: "第1回授業の復習", status: "active", link: "./test01/index.html", passScore: "4点" },
            { id: 2, name: "第2回授業の復習", status: "active", link: "./test02/index.html", passScore: "10点" },
            { id: 3, name: "第3回授業の復習", status: "prep", link: "./test03/index.html", passScore: "-" },
            { id: 4, name: "第4回授業の復習", status: "prep", link: "./test04/index.html", passScore: "-" },
            { id: 5, name: "第5回授業の復習", status: "prep", link: "./test05/index.html", passScore: "-" },
            { id: 6, name: "第6回授業の復習", status: "prep", link: "./test06/index.html", passScore: "-" },
            { id: 7, name: "第7回授業の復習", status: "prep", link: "./test07/index.html", passScore: "-" },
            { id: 8, name: "第8回授業の復習", status: "prep", link: "./test08/index.html", passScore: "-" },
            { id: 9, name: "第9回授業の復習", status: "prep", link: "./test09/index.html", passScore: "-" },
            { id: 10, name: "第10回授業の復習", status: "prep", link: "./test10/index.html", passScore: "-" },
            { id: 11, name: "第11回授業の復習", status: "prep", link: "./test11/index.html", passScore: "-" },
            { id: 12, name: "第12回授業の復習", status: "prep", link: "./test12/index.html", passScore: "-" },
            { id: 13, name: "第13回授業の復習", status: "prep", link: "./test13/index.html", passScore: "-" },
            { id: 14, name: "第14回授業の復習", status: "prep", link: "./test14/index.html", passScore: "-" },
        ];

        // テーブル本体を生成する処理
        const tbody = document.getElementById('test-list-body');

        testsData.forEach(test => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-gray-50 transition-colors";

            // ステータスに応じた処理の分岐
            const isActive = test.status === "active";
            const statusLabel = isActive ? "テスト受付中" : "テスト準備中";
            const statusClass = isActive ? "status-active" : "status-prep";
            
            // 準備中の場合はリンクを無効化する
            const linkTagOpen = isActive 
                ? `<a href="${test.link}" class="text-blue-600 underline hover:text-blue-800 font-bold">` 
                : `<span class="text-gray-600">`;
            const linkTagClose = isActive ? `</a>` : `</span>`;

            // 実施ボタンのHTML生成
            const btnHtml = isActive
                ? `<a href="${test.link}" class="inline-block border border-gray-400 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-1 rounded text-xs font-bold transition">テスト実施</a>`
                : `<button disabled class="border border-gray-200 bg-gray-50 text-gray-300 px-4 py-1 rounded text-xs cursor-not-allowed">テスト実施</button>`;

            tr.innerHTML = `
                <td class="border border-gray-300 p-3 text-left pl-4 whitespace-nowrap">
                    ${linkTagOpen}${test.name}${linkTagClose}
                </td>
                <td class="border border-gray-300 p-2 whitespace-nowrap">
                    <span class="inline-block text-white text-xs px-3 py-1 rounded ${statusClass}">
                        ${statusLabel}
                    </span>
                </td>
                <td class="border border-gray-300 p-2 text-gray-600 whitespace-nowrap">
                    ${test.passScore}
                </td>
                <td class="border border-gray-300 p-2 whitespace-nowrap">
                    ${btnHtml}
                </td>
            `;

            tbody.appendChild(tr);
        });
    </script>
</body>
</html>
