            { year: "2024年度('23年実施)", prefecture: '福岡県', subject: '中・高社会', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/kyosai-pdf/%E3%80%90%E7%A6%8F%E5%B2%A1%E7%9C%8C%E3%80%912024%E5%B9%B4%E5%BA%A6(2023%E5%B9%B4%E5%AE%9F%E6%96%BD)%E6%95%99%E5%93%A1%E6%8E%A1%E7%94%A8%E8%A9%A6%E9%A8%93%EF%BC%BB%E4%B8%AD%E3%83%BB%E9%AB%98%E7%A4%BE%E4%BC%9A%EF%BC%BD.pdf' },
            { year: "2024年度('23年実施)", prefecture: '福岡市', subject: '教職教養・一般教養', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/kyosai-pdf/%E3%80%90%E7%A6%8F%E5%B2%A1%E5%B8%82%E3%80%912024%E5%B9%B4%E5%BA%A6(2023%E5%B9%B4%E5%AE%9F%E6%96%BD)%E6%95%99%E5%93%A1%E6%8E%A1%E7%94%A8%E8%A9%A6%E9%A8%93%EF%BC%BB%E6%95%99%E8%81%B7%E6%95%99%E9%A4%8A%E3%83%BB%E4%B8%80%E8%88%AC%E6%95%99%E9%A4%8A%EF%BC%BD.pdf' },
            { year: "2024年度('23年実施)", prefecture: '福岡市', subject: '中・高社会', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/kyosai-pdf/%E3%80%90%E7%A6%8F%E5%B2%A1%E5%B8%82%E3%80%912024%E5%B9%B4%E5%BA%A6(2023%E5%B9%B4%E5%AE%9F%E6%96%BD)%E6%95%99%E5%93%A1%E6%8E%A1%E7%94%A8%E8%A9%A6%E9%A8%93%EF%BC%BB%E4%B8%AD%E3%83%BB%E9%AB%98%E7%A4%BE%E4%BC%9A%EF%BC%BD.pdf' },
            { year: "2024年度('23年実施)", prefecture: '北九州市', subject: '教職教養・一般教養', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/kyosai-pdf/%E3%80%90%E5%8C%97%E4%B9%9D%E5%B7%9E%E5%B8%82%E3%80%912024%E5%B9%B4%E5%BA%A6(2023%E5%B9%B4%E5%AE%9F%E6%96%BD)%E6%95%99%E5%93%A1%E6%8E%A1%E7%94%A8%E8%A9%A6%E9%A8%93%EF%BC%BB%E6%95%99%E8%81%B7%E6%95%99%E9%A4%8A%E3%83%BB%E4%B8%80%E8%88%AC%E6%95%99%E9%A4%8A%EF%BC%BD.pdf' },
            { year: "2024年度('23年実施)", prefecture: '北九州市', subject: '中・高社会', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/kyosai-pdf/%E3%80%90%E5%8C%97%E4%B9%9D%E5%B7%9E%E5%B8%82%E3%80%912024%E5%B9%B4%E5%BA%A6(2023%E5%B9%B4%E5%AE%9F%E6%96%BD)%E6%95%99%E5%93%A1%E6%8E%A1%E7%94%A8%E8%A9%A6%E9%A8%93%EF%BC%BB%E4%B8%AD%E3%83%BB%E9%AB%98%E7%A4%BE%E4%BC%9A%EF%BC%BD.pdf' },
            { year: "2024年度('23年実施)", prefecture: '佐賀県', subject: '教職教養・一般教養', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/kyosai-pdf/%E3%80%90%E4%BD%90%E8%B3%80%E7%9C%8C%E3%80%912024%E5%B9%B4%E5%BA%A6(2023%E5%B9%B4%E5%AE%9F%E6%96%BD)%E6%95%99%E5%93%A1%E6%8E%A1%E7%94%A8%E8%A9%A6%E9%A8%93%EF%BC%BB%E6%95%99%E8%81%B7%E6%95%99%E9%A4%8A%E3%83%BB%E4%B8%80%E8%88%AC%E6%95%99%E9%A4%8A%EF%BC%BD.pdf' },
            { year: "2024年度('23年実施)", prefecture: '佐賀県', subject: '中・高社会', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/kyosai-pdf/%E3%80%90%E4%BD%90%E8%B3%80%E7%9C%8C%E3%80%912024%E5%B9%B4%E5%BA%A6(2023%E5%B9%B4%E5%AE%9F%E6%96%BD)%E6%95%99%E5%93%A1%E6%8E%A1%E7%94%A8%E8%A9%A6%E9%A8%93%EF%BC%BB%E4%B8%AD%E3%83%BB%E9%AB%98%E7%A4%BE%E4%BC%9A%EF%BC%BD.pdf' }
        ];

        // 並び順を指定（この順で自治体がグループ化されます）
        const prefOrder = ['山口県', '福岡県', '福岡市', '北九州市', '佐賀県'];

        function init() {
            // データを 自治体順 ＞ 科目順 ＞ 年度降順 でソート
            allPdfsData.sort((a, b) => {
                if (prefOrder.indexOf(a.prefecture) !== prefOrder.indexOf(b.prefecture)) {
                    return prefOrder.indexOf(a.prefecture) - prefOrder.indexOf(b.prefecture);
                }
                if (a.subject !== b.subject) {
                    return a.subject.localeCompare(b.subject);
                }
                // 年度（2026, 2025, 2024...）を降順でソート
                return b.year.localeCompare(a.year);
            });

            renderScrollButtons();
            renderTable();
            setupScrollTopButton();
        }

        // 自治体へのジャンプボタンを生成
        function renderScrollButtons() {
            const container = document.getElementById('scroll-buttons-container');
            container.innerHTML = '';

            prefOrder.forEach(pref => {
                const button = document.createElement('button');
                button.className = 'px-3 py-1.5 md:px-4 md:py-2 text-[11px] md:text-sm font-medium rounded border border-gray-300 bg-white hover:bg-blue-50 hover:text-blue-700 hover:border-blue-300 text-gray-700 transition-colors shadow-sm';
                button.textContent = pref;
                
                // クリックで該当する自治体の行へスクロール
                button.onclick = () => {
                    const targetRow = document.getElementById(`pref-${pref}`);
                    if (targetRow) {
                        // テーブルのヘッダーや画面の余白を考慮して少し上にオフセット
                        const offsetPosition = targetRow.getBoundingClientRect().top + window.scrollY - 60;
                        window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    }
                };
                
                container.appendChild(button);
            });
        }

        // 全データを1つのテーブルに描画
        function renderTable() {
            const tbody = document.getElementById('pdf-list-body');
            tbody.innerHTML = '';

            let prevPrefecture = "";

            allPdfsData.forEach((item) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/50 transition-colors border-b border-gray-200 last:border-b-0";

                // 自治体の区切り判定
                if (prevPrefecture !== item.prefecture) {
                    // スクロール先のアンカーとしてIDを付与
                    tr.id = `pref-${item.prefecture}`;
                    
                    // 最初の自治体以外は、区切りを分かりやすくする
                    if (prevPrefecture !== "") {
                        tr.classList.add("border-t-[3px]", "border-gray-300");
                    }
                }
                prevPrefecture = item.prefecture;

                const isPdfActive = item.status === "active";
                const statusLabel = isPdfActive ? "公開中" : "準備中";
                // カラー復活: 公開中は青系、準備中はグレー系
                const statusClass = isPdfActive ? "bg-blue-500 text-white shadow-sm" : "bg-gray-400 text-white";
                
                // PDFリンクアイコン（カラー復活）
                const pdfHtml = isPdfActive
                    ? `<a href="${item.pdfLink}" target="_blank" class="text-red-500 hover:text-red-700 font-bold flex items-center justify-center gap-0.5 md:gap-1 p-1 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-5 md:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        <span class="text-[11px] md:text-sm">PDF</span>
                       </a>`
                    : `<span class="text-gray-300 flex items-center justify-center gap-0.5 md:gap-1 cursor-not-allowed p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-5 md:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        <span class="text-[11px] md:text-sm">PDF</span>
                       </span>`;

                // テーブル行の構築（年度ラベルを科目名の横に追加）
                tr.innerHTML = `
                    <td class="p-2 md:p-3 text-left border-r border-gray-200">
                        <div class="flex flex-col sm:flex-row sm:items-center gap-0.5 sm:gap-3">
                            <div class="font-bold text-sm md:text-base min-w-[5rem] text-gray-800">
                                ${item.prefecture}
                            </div>
                            <div class="text-[11px] md:text-sm text-gray-600 mt-0.5 sm:mt-0 flex items-center flex-wrap gap-1.5">
                                <span>${item.subject}</span>
                                <span class="inline-block px-1.5 py-0.5 bg-indigo-50 text-indigo-600 rounded border border-indigo-200 text-[10px] md:text-xs font-medium whitespace-nowrap">
                                    ${item.year}
                                </span>
                            </div>
                        </div>
                    </td>
                    <td class="p-1 md:p-2 text-center border-r border-gray-200 align-middle">
                        ${pdfHtml}
                    </td>
                    <td class="p-2 md:p-3 text-center align-middle">
                        <span class="inline-block text-[10px] md:text-xs px-2 py-1 md:px-3 md:py-1.5 rounded-full ${statusClass} whitespace-nowrap">
                            ${statusLabel}
                        </span>
                    </td>
                `;

                tbody.appendChild(tr);
            });

            document.getElementById('pagination-info').textContent = `全 ${allPdfsData.length} 件`;
        }

        // トップへ戻るボタンの制御
        function setupScrollTopButton() {
            const btn = document.getElementById('scrollTopBtn');
            
            // スクロールイベントで表示/非表示を切り替え
            window.addEventListener('scroll', () => {
                if (window.scrollY > 200) {
                    btn.classList.add('show');
                } else {
                    btn.classList.remove('show');
                }
            });

            // クリックで上部へスムーズスクロール
            btn.onclick = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
        }

        window.onload = init;
    </script>
