        ];

        // タブとして表示する年度のリスト
        const tabYears = ['2026年度(2025年実施)', '2025年度(2024年実施)', '2024年度(2023年実施)'];
        let currentYear = tabYears[0]; // 初期表示は一番新しい年度

        // 初期化処理
        function init() {
            renderTabs();
            renderTable(currentYear);
        }

        // タブを描画する処理
        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';

            tabYears.forEach(year => {
                const button = document.createElement('button');
                const isActive = year === currentYear;
                
                // アクティブか非アクティブかでスタイルを切り替え
                button.className = `px-4 py-2 text-sm font-bold rounded-t-md transition-colors ${isActive ? 'tab-active' : 'tab-inactive'}`;
                button.textContent = year;
                
                // タブがクリックされた時の処理
                button.onclick = () => {
                    currentYear = year;
                    renderTabs(); // タブの見た目（色）を更新
                    renderTable(year); // 選択された年度のテーブルを再描画
                };
                
                tabsContainer.appendChild(button);
            });
        }

        // テーブル本体を生成・描画する処理
        function renderTable(selectedYear) {
            const tbody = document.getElementById('pdf-list-body');
            tbody.innerHTML = '';

            // 現在選択されている年度のデータのみを抽出
            const filteredData = allPdfsData.filter(item => item.year === selectedYear);

            // 前の行の自治体名を記憶（同じ自治体が続く場合はセルを結合するような見た目にする工夫）
            let prevPrefecture = "";

            filteredData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";

                // 自治体行の境界線を見やすくするための処理
                if (prevPrefecture !== "" && prevPrefecture !== item.prefecture) {
                    tr.classList.add("border-t-2", "border-gray-300");
                }
                prevPrefecture = item.prefecture;

                const isPdfActive = item.status === "active";
                const statusLabel = isPdfActive ? "公開中" : "準備中";
                const statusClass = isPdfActive ? "status-active" : "status-prep";
                
                // PDFリンクのHTML生成（ステータスに依存）
                const pdfHtml = isPdfActive
                    ? `<a href="${item.pdfLink}" target="_blank" class="text-red-500 hover:text-red-700 font-bold flex items-center justify-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        PDF
                       </a>`
                    : `<span class="text-gray-300 flex items-center justify-center gap-1 cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        PDF
                       </span>`;

                // テーブル行の構築
                tr.innerHTML = `
                    <td class="border border-gray-300 p-2 text-center font-medium text-gray-800 whitespace-nowrap bg-white">
                        ${item.prefecture}
                    </td>
                    <td class="border border-gray-300 p-2 text-center text-gray-700 whitespace-nowrap">
                        ${item.subject}
                    </td>
                    <td class="border border-gray-300 p-2 whitespace-nowrap">
                        ${pdfHtml}
                    </td>
                    <td class="border border-gray-300 p-2 text-center whitespace-nowrap">
                        <span class="inline-block text-white text-xs px-3 py-1.5 rounded-full ${statusClass} min-w-[70px]">
                            ${statusLabel}
                        </span>
                    </td>
                `;

                tbody.appendChild(tr);
            });

            // ページネーション部分に表示中の件数を更新
            document.getElementById('pagination-info').textContent = `全 ${filteredData.length} 件`;
        }

        // ページ読み込み完了時に初期化処理を実行
        window.onload = init;
    </script>
