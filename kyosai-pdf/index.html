        ];

        // タブとして表示する年度のリスト
        const tabYears = ["2026年度('25年実施)", "2025年度('24年実施)", "2024年度('23年実施)"];
        let currentYear = tabYears[0];

        function init() {
            renderTabs();
            renderTable(currentYear);
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';

            tabYears.forEach(year => {
                const button = document.createElement('button');
                const isActive = year === currentYear;
                
                // モバイル向けにパディングと文字サイズを縮小
                button.className = `px-2 py-1.5 md:px-4 md:py-2 text-[11px] md:text-sm font-bold rounded-t-md transition-colors ${isActive ? 'tab-active' : 'tab-inactive border-transparent border-b-2'}`;
                button.textContent = year;
                
                button.onclick = () => {
                    currentYear = year;
                    renderTabs();
                    renderTable(year);
                };
                
                tabsContainer.appendChild(button);
            });
        }

        function renderTable(selectedYear) {
            const tbody = document.getElementById('pdf-list-body');
            tbody.innerHTML = '';

            const filteredData = allPdfsData.filter(item => item.year === selectedYear);
            let prevPrefecture = "";

            filteredData.forEach((item) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors border-b border-gray-200 last:border-b-0";

                // 自治体の区切りを分かりやすくする（上のボーダーを少し濃くする）
                if (prevPrefecture !== "" && prevPrefecture !== item.prefecture) {
                    tr.classList.add("border-t-2", "border-gray-300");
                }
                prevPrefecture = item.prefecture;

                const isPdfActive = item.status === "active";
                const statusLabel = isPdfActive ? "公開中" : "準備中";
                const statusClass = isPdfActive ? "status-active" : "status-prep";
                
                // PDFリンクアイコン
                const pdfHtml = isPdfActive
                    ? `<a href="${item.pdfLink}" target="_blank" class="text-red-500 hover:text-red-700 font-bold flex items-center justify-center gap-0.5 md:gap-1 p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-5 md:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        <span class="text-[11px] md:text-sm">PDF</span>
                       </a>`
                    : `<span class="text-gray-300 flex items-center justify-center gap-0.5 md:gap-1 cursor-not-allowed p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-5 md:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        <span class="text-[11px] md:text-sm">PDF</span>
                       </span>`;

                // 自治体名をリンクにする（ステータスがアクティブな場合）
                const prefectureHtml = isPdfActive
                    ? `<a href="${item.pdfLink}" target="_blank" class="text-theme hover:text-blue-800 underline underline-offset-2 decoration-blue-200 transition-colors">${item.prefecture}</a>`
                    : `<span class="text-gray-600">${item.prefecture}</span>`;

                // 結合されたセル：モバイル時は縦（flex-col）、PC時は横（md:flex-row）に並べる
                tr.innerHTML = `
                    <td class="p-2 md:p-3 text-left border-r border-gray-200">
                        <div class="flex flex-col sm:flex-row sm:items-center gap-0.5 sm:gap-3">
                            <div class="font-bold text-sm md:text-base min-w-[5rem]">
                                ${prefectureHtml}
                            </div>
                            <div class="text-[11px] md:text-sm text-gray-600 mt-0.5 sm:mt-0">
                                ${item.subject}
                            </div>
                        </div>
                    </td>
                    <td class="p-1 md:p-2 text-center border-r border-gray-200 align-middle">
                        ${pdfHtml}
                    </td>
                    <td class="p-2 md:p-3 text-center align-middle">
                        <span class="inline-block text-white text-[10px] md:text-xs px-2 py-1 md:px-3 md:py-1.5 rounded-full ${statusClass} whitespace-nowrap">
                            ${statusLabel}
                        </span>
                    </td>
                `;

                tbody.appendChild(tr);
            });

            document.getElementById('pagination-info').textContent = `全 ${filteredData.length} 件`;
        }

        window.onload = init;
    </script>
