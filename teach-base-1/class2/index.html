<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第2回復習問題</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 画像に合わせた深緑色をテーマカラーに設定 */
        .theme-bg { background-color: #005c42; }
        .theme-bg-hover:hover { background-color: #004531; }
        .theme-text { color: #005c42; }
        .theme-border { border-color: #005c42; }
        .theme-ring:focus { 
            --tw-ring-color: #005c42; 
            border-color: #005c42; 
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen pb-10">

    <!-- スタート画面 -->
    <div id="start-screen" class="max-w-5xl mx-auto p-4 pt-8">
        <div class="bg-white border border-gray-300 shadow-sm mb-6">
            <table class="w-full text-sm border-collapse">
                <tbody>
                    <tr><th class="w-1/4 theme-bg text-white p-3 border border-gray-300 text-left">テストグループ</th><td class="p-3 border border-gray-300">教職教養基礎</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト名</th><td class="p-3 border border-gray-300">第2回復習問題</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト説明</th><td class="p-3 border border-gray-300">授業終了後、復習問題に取り組んで下さい。</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト方法区分</th><td class="p-3 border border-gray-300">WEB</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト区分</th><td class="p-3 border border-gray-300">随時試験</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">満点</th><td class="p-3 border border-gray-300">11点</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">コース</th><td class="p-3 border border-gray-300">教育心理学</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">目次</th><td class="p-3 border border-gray-300">【第2回】</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">問題表示区分</th><td class="p-3 border border-gray-300">一問題表示</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">問題出題形式</th><td class="p-3 border border-gray-300">同一</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト回数</th><td class="p-3 border border-gray-300">1回</td></tr>
                </tbody>
            </table>
        </div>
        <div class="text-center mt-8 flex justify-center gap-4">
            <a href="https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/index.html" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-8 rounded shadow transition duration-200 inline-block">テスト一覧へ</a>
            <button id="start-btn" class="theme-bg theme-bg-hover text-white font-bold py-3 px-12 rounded shadow transition duration-200">テスト開始</button>
        </div>
    </div>

    <!-- テスト画面 -->
    <div id="test-screen" class="hidden max-w-5xl mx-auto p-4 flex flex-col md:flex-row gap-6">
        <!-- 左側：問題リスト -->
        <div class="hidden md:block w-48 shrink-0">
            <div id="question-nav-list" class="flex flex-col gap-1">
                <!-- JSで生成 -->
            </div>
        </div>

        <!-- 右側：問題エリア -->
        <div class="flex-grow">
            <div class="flex justify-between items-center mb-4 bg-gray-200 p-3 rounded border border-gray-300">
                <div class="font-bold text-gray-700">第2回復習問題</div>
            </div>
            
            <div class="border border-gray-300 rounded shadow-sm bg-white mb-6">
                <div id="question-number" class="bg-emerald-50 px-4 py-3 border-b border-gray-300 text-gray-800 font-bold">
                    <!-- 問題番号 -->
                </div>
                <div class="p-6">
                    <!-- whitespace-pre-wrap で改行を反映 -->
                    <p id="question-text" class="text-lg mb-8 leading-relaxed whitespace-pre-wrap"></p>
                    <div class="mb-4 bg-gray-50 p-4 border rounded" id="answer-container">
                        <!-- JSで入力欄(セレクトボックス)を生成 -->
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center border-t pt-4">
                <button id="prev-btn" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-6 rounded transition disabled:opacity-50 disabled:cursor-not-allowed">前へ</button>
                <div class="flex items-center">
                    <span id="progress-text" class="mr-6 text-gray-600 font-bold">1 / 4</span>
                    <button id="next-btn" class="theme-bg theme-bg-hover text-white font-bold py-2 px-6 rounded transition">次へ</button>
                    <button id="finish-btn" class="hidden bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-2 px-6 rounded shadow transition">テスト提出</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 採点結果画面 -->
    <div id="result-screen" class="hidden max-w-5xl mx-auto p-4">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b-2 theme-border pb-2">採点結果</h2>
        
        <div class="bg-white border border-gray-300 rounded shadow-sm p-6 mb-8 text-center">
            <p class="text-lg text-gray-600 mb-2">あなたの得点</p>
            <p id="total-score" class="text-5xl font-bold theme-text mb-2">0点 / 11点</p>
        </div>

        <div id="result-list" class="space-y-8">
            <!-- JSで結果を生成 -->
        </div>

        <div class="text-center mt-12 mb-8">
            <button id="retry-btn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-12 rounded shadow transition duration-200">テスト一覧へ戻る</button>
        </div>
    </div>

    <!-- 確認モーダル -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded shadow-lg max-w-sm w-full mx-4">
            <p class="mb-6 text-center text-lg font-bold text-gray-800">テストを提出して採点しますか？</p>
            <div class="flex justify-center gap-4">
                <button id="modal-cancel-btn" class="px-6 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition font-bold">いいえ</button>
                <button id="modal-ok-btn" class="px-6 py-2 bg-yellow-400 text-gray-900 rounded hover:bg-yellow-500 transition font-bold">はい</button>
            </div>
        </div>
    </div>

    <script>
        // 画像の内容を反映した問題データ（選択式・プルダウン用に改変）
        const originalQuestions = [
            { 
                id: 1, 
                point: 1,
                pointPerItem: 1,
                inputCount: 1,
                ordered: true,
                text: "次の文と最も関係の深い人物を答えよ。\n\n(1) 1879年，ドイツのライプツィヒ大学に世界初の心理学実験室を開設し，独立した実証科学として心理学を創始した。生理学の出身であることを生かし，内観法と実験を組み合わせた独自の研究方法を提唱した。", 
                options: [
                    ["フロイト", "ヴント", "ヘルバルト"]
                ],
                answer: ["ヴント"],
                displayAnswer: "ヴント"
            },
            { 
                id: 2, 
                point: 1,
                pointPerItem: 1,
                inputCount: 1,
                ordered: true,
                text: "次の文と最も関係の深い人物を答えよ。\n\n(2) 心理学の対象から主観的な意識を排除し，客観的にとらえられる行動によって心理学を形成しようとする行動主義心理学を唱えた。後に「意識（心）なき心理学」として批判されたが，学習理論や行動療法の基礎として現在まで影響を及ぼしている。", 
                options: [
                    ["パブロフ", "スキナー", "ワトソン"]
                ],
                answer: ["ワトソン"],
                displayAnswer: "ワトソン"
            },
            { 
                id: 3, 
                point: 4,
                pointPerItem: 1,
                inputCount: 4,
                ordered: true,
                text: "次の文の（　　）に適する語句を選べ。\n\n心の深層に自分でも気付かない領域である（　①　）の存在を仮定し，精神分析学を創始したのは（　②　）である。性的なエネルギーの観点から，人間の発達段階と幼児期体験の重要性を示し，従来の児童観に変化を与えたことなどで，教育心理学に大きな貢献をした。また，その弟子たちも業績を残している。例えば，青年期において（　③　）の確立が重要であることを指摘した（　④　）は，発達心理学の研究に従事した代表者である。また，分析心理学を唱えたユングも知られている。", 
                options: [
                    ["前意識", "無意識", "集合的無意識"],
                    ["アドラー", "フロイト", "ユング"],
                    ["自己実現", "自我同一性", "劣等コンプレックス"],
                    ["ヴィゴツキー", "ピアジェ", "エリクソン"]
                ],
                answer: ["無意識", "フロイト", "自我同一性", "エリクソン"],
                displayAnswer: "① 無意識\n② フロイト\n③ 自我同一性\n④ エリクソン"
            },
            { 
                id: 4, 
                point: 5,
                pointPerItem: 1,
                inputCount: 5,
                ordered: true,
                text: "次の文の（　　）に適する語句を選べ。\n\n一方で，まとまりのあるものは部分に分解不可能だという立場から，全体性を重視する（　①　）が生まれた。代表的な理論家は，仮現運動で知られる（　②　），理論的なまとめ役のコフカ，そして学習理論の領域で洞察説を唱えた（　③　）である。加えて，理論的研究と実践的活動の統合を図る（　④　）を唱えた（　⑤　）も，場の理論をはじめとして，学習，人格，集団，さらには発達の領域において数々の業績を残している。", 
                options: [
                    ["行動主義心理学", "ゲシュタルト心理学", "認知心理学"],
                    ["ジェームズ", "ヴント", "ウェルトハイマー"],
                    ["ケーラー", "トールマン", "バンデューラ"],
                    ["アクション・リサーチ", "フィールドワーク", "ケーススタディ"],
                    ["ブルーナー", "レヴィン", "ソーンダイク"]
                ],
                answer: ["ゲシュタルト心理学", "ウェルトハイマー", "ケーラー", "アクション・リサーチ", "レヴィン"],
                displayAnswer: "① ゲシュタルト心理学\n② ウェルトハイマー\n③ ケーラー\n④ アクション・リサーチ\n⑤ レヴィン"
            }
        ];

        // 状態変数
        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {}; // { questionId: ["入力1", "入力2"...] }

        // DOM要素
        const startScreen = document.getElementById('start-screen');
        const testScreen = document.getElementById('test-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const answerContainer = document.getElementById('answer-container');
        const questionNavList = document.getElementById('question-nav-list');
        const confirmModal = document.getElementById('confirm-modal');

        // テスト開始処理
        function startTest() {
            questions = [...originalQuestions];
            currentQuestionIndex = 0;
            userAnswers = {};
            
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            testScreen.classList.remove('hidden');

            renderNavList();
            renderQuestion();
        }

        // 左側の問題ナビゲーション
        function renderNavList() {
            questionNavList.innerHTML = '';
            questions.forEach((_, index) => {
                const navItem = document.createElement('div');
                navItem.className = `p-2 border rounded font-bold text-center cursor-pointer transition-colors ${index === currentQuestionIndex ? 'bg-emerald-100 border-emerald-400 theme-text' : 'bg-gray-200 border-gray-300 hover:bg-gray-300'}`;
                navItem.innerText = `【問題${index + 1}】`;
                
                navItem.addEventListener('click', () => {
                    if (currentQuestionIndex !== index) {
                        saveAnswer();
                        currentQuestionIndex = index;
                        renderQuestion();
                    }
                });

                questionNavList.appendChild(navItem);
            });
        }

        // 問題の表示
        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-number').innerText = `【問題${currentQuestionIndex + 1}】（${q.point}点）`;
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;

            // 入力欄(プルダウン)の生成と保存されている解答のセット
            answerContainer.innerHTML = '';
            const label = document.createElement('label');
            label.className = 'block text-sm font-bold text-gray-700 mb-2';
            label.innerText = '解答を選択してください：';
            answerContainer.appendChild(label);

            if (q.inputCount) {
                for(let i = 0; i < q.inputCount; i++) {
                    const select = document.createElement('select');
                    select.className = 'answer-input multi-input shadow-sm appearance-none border border-gray-400 rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-1 theme-ring mb-3 bg-white cursor-pointer';
                    
                    // デフォルトの未選択オプション
                    const defaultOption = document.createElement('option');
                    defaultOption.value = "";
                    if (q.inputCount === 1) {
                        defaultOption.text = "選択してください";
                    } else {
                        defaultOption.text = `（${'①②③④⑤'[i]}）を選択してください`;
                    }
                    defaultOption.disabled = true;
                    defaultOption.selected = true;
                    select.appendChild(defaultOption);

                    // 選択肢の追加
                    q.options[i].forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.text = opt;
                        // 既に回答済みの場合はそれを選択状態にする
                        if (userAnswers[q.id] && userAnswers[q.id][i] === opt) {
                            option.selected = true;
                        }
                        select.appendChild(option);
                    });

                    answerContainer.appendChild(select);
                }
                // キーボードのポップアップを防ぐため、JSでの自動focus()は行いません。
            }

            // 左側のナビゲーションの色を更新
            Array.from(questionNavList.children).forEach((el, idx) => {
                if (idx === currentQuestionIndex) {
                    el.className = 'p-2 border rounded font-bold text-center cursor-pointer transition-colors bg-emerald-100 border-emerald-400 theme-text';
                } else {
                    el.className = 'p-2 border rounded font-bold text-center cursor-pointer transition-colors bg-gray-200 border-gray-300 hover:bg-gray-300';
                }
            });

            // ボタンの表示切り替え
            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === questions.length - 1) {
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('finish-btn').classList.remove('hidden');
            } else {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('finish-btn').classList.add('hidden');
            }
        }

        // 解答の保存
        function saveAnswer() {
            const q = questions[currentQuestionIndex];
            if (q.inputCount) {
                const inputs = answerContainer.querySelectorAll('.multi-input');
                userAnswers[q.id] = Array.from(inputs).map(input => input.value);
            }
        }

        // 採点と結果表示
        function executeScoring() {
            testScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            confirmModal.classList.add('hidden');

            let score = 0;
            let totalPoints = 0;
            const resultContainer = document.getElementById('result-list');
            resultContainer.innerHTML = '';

            questions.forEach((q, index) => {
                totalPoints += q.point;
                let earnedPoint = 0;
                let isCorrect = false;
                let displayUserAnswer = "";

                if (q.inputCount) {
                    const userAnsArray = userAnswers[q.id] || Array(q.inputCount).fill("");
                    let matchCount = 0;

                    if (q.ordered) {
                        // 順番通りに正解と一致するか判定
                        q.answer.forEach((correctWord, i) => {
                            if (userAnsArray[i] === correctWord) {
                                matchCount++;
                            }
                        });
                    }
                    
                    earnedPoint = matchCount * q.pointPerItem;
                    isCorrect = earnedPoint === q.point; 

                    displayUserAnswer = userAnsArray.map((ans, idx) => {
                        const prefix = q.inputCount > 1 ? `①②③④⑤`[idx] + " " : "";
                        return ans.trim() === "" ? `${prefix}<span class='text-gray-400'>未選択</span>` : `${prefix}${ans}`;
                    }).join('\n');
                }
                
                score += earnedPoint;

                let markHtml = '';
                if (earnedPoint === q.point) {
                    markHtml = '<span class="text-red-600 font-bold text-xl mr-2">○</span>';
                } else if (earnedPoint > 0) {
                    markHtml = '<span class="text-yellow-600 font-bold text-xl mr-2">△</span>';
                } else {
                    markHtml = '<span class="text-blue-600 font-bold text-xl mr-2">×</span>';
                }

                const itemHtml = `
                    <div class="border border-gray-300 rounded shadow-sm bg-white overflow-hidden">
                        <div class="bg-emerald-50 px-4 py-2 border-b border-gray-300 text-gray-800 font-bold flex items-center">
                            ${markHtml}
                            【問題${index + 1}】（${q.point}点）
                        </div>
                        <div class="p-4 md:p-6">
                            <p class="mb-6 text-gray-800 whitespace-pre-wrap">${q.text}</p>
                            <table class="w-full border-collapse text-sm">
                                <tbody>
                                    <tr>
                                        <th class="w-1/3 md:w-1/4 theme-bg text-white p-2 border border-gray-300 text-left">正解</th>
                                        <td class="p-2 border border-gray-300 font-bold whitespace-pre-wrap">${q.displayAnswer}</td>
                                    </tr>
                                    <tr>
                                        <th class="theme-bg text-white p-2 border border-gray-300 text-left">学習者解答</th>
                                        <td class="p-2 border border-gray-300 whitespace-pre-wrap ${isCorrect ? '' : (earnedPoint > 0 ? 'text-yellow-700 font-bold' : 'text-red-600 font-bold')}">${displayUserAnswer}</td>
                                    </tr>
                                    <tr>
                                        <th class="theme-bg text-white p-2 border border-gray-300 text-left">点数</th>
                                        <td class="p-2 border border-gray-300">${earnedPoint}点／${q.point}点</td>
                                    </tr>
                                    <tr>
                                        <th class="theme-bg text-white p-2 border border-gray-300 text-left">問題解説</th>
                                        <td class="p-2 border border-gray-300 text-gray-500"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                resultContainer.insertAdjacentHTML('beforeend', itemHtml);
            });

            document.getElementById('total-score').innerText = `${score}点 / ${totalPoints}点`;
        }

        // イベントリスナーの設定
        document.getElementById('start-btn').addEventListener('click', startTest);
        
        // テスト一覧へ戻るリンクの更新
        document.getElementById('retry-btn').addEventListener('click', () => {
            window.location.href = "https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/index.html";
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            saveAnswer();
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            saveAnswer();
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        });

        // selectの変更時に即座に保存
        answerContainer.addEventListener('change', (e) => {
            if (e.target.classList.contains('answer-input')) {
                saveAnswer();
            }
        });

        document.getElementById('finish-btn').addEventListener('click', () => {
            saveAnswer();
            confirmModal.classList.remove('hidden');
        });

        document.getElementById('modal-cancel-btn').addEventListener('click', () => {
            confirmModal.classList.add('hidden');
        });

        document.getElementById('modal-ok-btn').addEventListener('click', () => {
            executeScoring();
        });

    </script>
</body>
</html>
