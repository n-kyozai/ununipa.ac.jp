<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育原理のふりかえりテスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ベースとなる青色 */
        .theme-bg { background-color: #005682; }
        .theme-text { color: #005682; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen pb-10">

    <!-- スタート画面 -->
    <div id="start-screen" class="max-w-5xl mx-auto p-4 pt-8">
        <div class="bg-white border border-gray-300 shadow-sm mb-6">
            <table class="w-full text-sm border-collapse">
                <tbody>
                    <tr><th class="w-1/4 theme-bg text-white p-3 border border-gray-300 text-left">テストグループ</th><td class="p-3 border border-gray-300">教職教養</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト名</th><td class="p-3 border border-gray-300">教育原理：教育方法</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト説明</th><td class="p-3 border border-gray-300">「教育方法」に関するふりかえりテストです。<br>教員採用試験の頻出項目（教授法の歴史、著名な学習理論と提唱者、学習形態など）を出題します。<br>満点を目指して繰り返し学習しましょう。</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">満点</th><td class="p-3 border border-gray-300">10点</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">合格点数</th><td class="p-3 border border-gray-300">10点</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">テスト時間</th><td class="p-3 border border-gray-300">4分</td></tr>
                    <tr>
                        <th class="theme-bg text-white p-3 border border-gray-300 text-left">出題形式</th>
                        <td class="p-3 border border-gray-300">
                            <div class="flex items-center gap-6">
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="question-format" value="descriptive" checked class="w-4 h-4 text-blue-600 focus:ring-blue-500 mr-2">
                                    <span class="font-bold">記述式</span>
                                </label>
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="question-format" value="multiple-choice" class="w-4 h-4 text-blue-600 focus:ring-blue-500 mr-2">
                                    <span class="font-bold">選択式（四択）</span>
                                </label>
                            </div>
                        </td>
                    </tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">問題表示区分</th><td class="p-3 border border-gray-300">一問題表示</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">問題出題形式</th><td class="p-3 border border-gray-300">ランダム</td></tr>
                    <tr><th class="theme-bg text-white p-3 border border-gray-300 text-left">再テスト可否区分</th><td class="p-3 border border-gray-300">合格後も可</td></tr>
                </tbody>
            </table>
        </div>
        <div class="text-center mt-8 flex justify-center gap-4">
            <a href="https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/index.html" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-8 rounded shadow transition duration-200 inline-block">テスト一覧へ</a>
            <button id="start-btn" class="theme-bg hover:bg-blue-800 text-white font-bold py-3 px-12 rounded shadow transition duration-200">テスト開始</button>
        </div>
    </div>

    <!-- テスト画面 -->
    <div id="test-screen" class="hidden max-w-5xl mx-auto p-4 flex flex-col md:flex-row gap-6">
        <!-- 左側：問題リスト -->
        <div class="hidden md:block w-48 shrink-0">
            <div id="question-nav-list" class="flex flex-col gap-1">
                <!-- JSで生成 -->
            </div>
        </div>

        <!-- 右側：問題エリア -->
        <div class="flex-grow">
            <div class="flex justify-between items-center mb-4 bg-gray-200 p-3 rounded border border-gray-300">
                <div class="font-bold text-gray-700">教育原理：教育方法</div>
                <div id="timer-display" class="text-gray-800 font-bold text-lg bg-white px-3 py-1 rounded shadow-sm border border-gray-300">残り時間 4:00</div>
            </div>
            
            <div class="border border-gray-300 rounded shadow-sm bg-white mb-6">
                <div id="question-number" class="bg-blue-100 px-4 py-3 border-b border-gray-300 text-gray-800 font-bold">
                    <!-- 問題番号 -->
                </div>
                <div class="p-6">
                    <p id="question-text" class="text-lg mb-8 leading-relaxed font-medium"></p>
                    <div id="answer-container" class="mb-4 bg-gray-50 p-4 border rounded min-h-[120px]">
                        <!-- JSで入力フォームまたは選択肢を生成 -->
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center border-t pt-4">
                <button id="prev-btn" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-6 rounded transition disabled:opacity-50 disabled:cursor-not-allowed">前へ</button>
                <div class="flex items-center">
                    <span id="progress-text" class="mr-6 text-gray-600 font-bold">1 / 10</span>
                    <button id="next-btn" class="theme-bg hover:bg-blue-800 text-white font-bold py-2 px-6 rounded transition">次へ</button>
                    <button id="finish-btn" class="hidden bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-2 px-6 rounded shadow transition">テスト提出</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 採点結果画面 -->
    <div id="result-screen" class="hidden max-w-5xl mx-auto p-4">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b-2 border-blue-800 pb-2">採点結果</h2>
        
        <div class="bg-white border border-gray-300 rounded shadow-sm p-6 mb-8 text-center">
            <p class="text-lg text-gray-600 mb-2">あなたの得点</p>
            <p id="total-score" class="text-5xl font-bold theme-text mb-2">0点 / 10点</p>
            <p id="pass-status" class="text-xl font-bold"></p>
        </div>

        <div id="result-list" class="space-y-8">
            <!-- JSで結果を生成 -->
        </div>

        <div class="text-center mt-12 mb-8">
            <button id="retry-btn" class="theme-bg hover:bg-blue-800 text-white font-bold py-3 px-12 rounded shadow transition duration-200">もう一度テストを行う（再テスト）</button>
        </div>
    </div>

    <!-- 確認モーダル -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded shadow-lg max-w-sm w-full mx-4">
            <p class="mb-6 text-center text-lg font-bold text-gray-800">テストを提出して採点しますか？</p>
            <div class="flex justify-center gap-4">
                <button id="modal-cancel-btn" class="px-6 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition font-bold">いいえ</button>
                <button id="modal-ok-btn" class="px-6 py-2 bg-yellow-400 text-gray-900 rounded hover:bg-yellow-500 transition font-bold">はい</button>
            </div>
        </div>
    </div>

    <script>
        // 教育原理「教育方法」の問題データと解説
        const originalQuestions = [
            { 
                id: 1, 
                text: "古代ギリシアの哲学者ソクラテスが用いた、対話と質問を繰り返すことによって、相手を「無知の知」へと導こうとする教育方法を何というか。", 
                answer: "産婆術",
                options: ["産婆術", "直観教授", "発見学習", "プログラム学習"],
                explanation: "「産婆術（助産術）」または「問答法」とよばれます。教師が一方的に教えるのではなく、学習者自身が自らの無知を自覚し、真理を生み出すのを助ける方法です。"
            },
            { 
                id: 2, 
                text: "コメニウスやペスタロッチが提唱した、言葉による詰め込み教育を批判し、事物そのものや絵などを提示して感覚器官に訴えかける教育方法を何というか。", 
                answer: "直観教授",
                options: ["直観教授", "問題解決学習", "有意味受容学習", "プログラム学習"],
                explanation: "コメニウスは世界初の絵入り教科書『世界図絵』を著し、感覚を通して事物を認識させる直観教授の基礎を築きました。"
            },
            { 
                id: 3, 
                text: "「明瞭・連合・系統・方法」という四段階教授法を提唱し、その後の教育方法論に大きな影響を与えたドイツの教育学者は誰か。", 
                answer: "ヘルバルト",
                options: ["ヘルバルト", "ツィラー", "ライン", "デューイ"],
                explanation: "ヘルバルトの四段階教授法は、後に弟子のツィラー（五段階教授法）やラインに受け継がれ、明治期の日本の学校教育にも多大な影響を与えました。"
            },
            { 
                id: 4, 
                text: "デューイが提唱した、学習者が生活経験の中から問題を見いだし、仮説を立てて検証していく「なすことによって学ぶ（Learning by doing）」学習方法を何というか。", 
                answer: "問題解決学習",
                options: ["問題解決学習", "発見学習", "プログラム学習", "プロジェクト・メソッド"],
                explanation: "デューイは、従来の教師中心の系統学習を批判し、子どもの興味や経験を出発点とする児童中心主義の立場から問題解決学習を提唱しました。"
            },
            { 
                id: 5, 
                text: "デューイの理論を具体化したもので、学習者自身が目的（プロジェクト）を設定し、計画を立てて自発的に実行していく学習方法（考案者：キルパトリック）を何というか。", 
                answer: "プロジェクト・メソッド",
                options: ["プロジェクト・メソッド", "発見学習", "ドルトン・プラン", "バズ学習"],
                explanation: "キルパトリックが考案したプロジェクト・メソッドは、学習者の自発的で目的をもった活動を重んじ、生活に結びついた総合的な学習を目指すものです。"
            },
            { 
                id: 6, 
                text: "ブルーナーが提唱した、教師が答えを教えるのではなく、学習者自身に科学的な法則や「学問の構造」を見つけ出させる学習方法を何というか。", 
                answer: "発見学習",
                options: ["発見学習", "問題解決学習", "有意味受容学習", "完全習得学習"],
                explanation: "ブルーナーは著書『教育の過程』の中で、どの学問にも基本となる構造があり、それを学習者自らが直観的思考によって発見する過程の重要性を説きました。"
            },
            { 
                id: 7, 
                text: "オーズベルが提唱した、学習者が既に持っている知識（認知構造）に、新しい学習内容を意味的・実質的に関連付けて組み込ませる学習方法を何というか。", 
                answer: "有意味受容学習",
                options: ["有意味受容学習", "発見学習", "プログラム学習", "問題解決学習"],
                explanation: "オーズベルは、発見学習のように時間がかかる方法を批判し、新しい学習の前に「先行オーガナイザー（枠組み）」を与えることで、効率的で意味のある学習が成立すると主張しました。"
            },
            { 
                id: 8, 
                text: "ブルームが提唱した、適切な学習条件（時間や指導法）を整え、形成的評価を繰り返すことで、大部分の学習者が目標に到達できるとする学習方法を何というか。", 
                answer: "完全習得学習",
                options: ["完全習得学習", "プログラム学習", "発見学習", "有意味受容学習"],
                explanation: "マスタリー・ラーニングともよばれます。教育の目的は、選抜ではなく、一人ひとりの子どもに学力を保障することにあるという考え方に基づいています。"
            },
            { 
                id: 9, 
                text: "スキナーが考案した、学習内容をスモールステップに分け、学習者の反応に即座にフィードバック（強化）を与えながら自己のペースで進める学習方法を何というか。", 
                answer: "プログラム学習",
                options: ["プログラム学習", "発見学習", "完全習得学習", "プロジェクト・メソッド"],
                explanation: "オペラント条件づけの理論を応用したもので、「スモール・ステップの原理」「即時確認の原理」「自己ペースの原理」などの原則に基づいています。"
            },
            { 
                id: 10, 
                text: "個別学習を支援するシステムの一つで、コンピュータを利用して、学習者の理解度やペースに応じた問題提示や指導を行う教育支援システムをアルファベット3文字で何というか。", 
                answer: "CAI",
                options: ["CAI", "CBT", "ICT", "LMS"],
                explanation: "CAI（Computer Assisted Instruction）は、プログラム学習の原理をコンピュータに応用したもので、現在のeラーニングや個別最適化された学習システムの先駆けとなるものです。"
            }
        ];

        // 状態変数
        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {}; 
        let timeLeft = 240; // 制限時間4分（240秒）
        let timerInterval = null;
        let selectedFormat = 'descriptive'; // 出題形式を保持

        // DOM要素
        const startScreen = document.getElementById('start-screen');
        const testScreen = document.getElementById('test-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const answerInput = document.getElementById('answer-input');
        const questionNavList = document.getElementById('question-nav-list');
        const confirmModal = document.getElementById('confirm-modal');

        // 配列をシャッフルする関数
        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        // テスト開始処理
        function startTest() {
            // 選択された出題形式を取得
            const formatRadio = document.querySelector('input[name="question-format"]:checked');
            selectedFormat = formatRadio ? formatRadio.value : 'descriptive';

            // 問題と選択肢をそれぞれシャッフルしてセット
            questions = shuffleArray(originalQuestions).map(q => {
                return {
                    ...q,
                    shuffledOptions: shuffleArray(q.options)
                };
            });
            
            currentQuestionIndex = 0;
            userAnswers = {};
            timeLeft = 240; // タイマーリセット
            
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            testScreen.classList.remove('hidden');

            renderNavList();
            renderQuestion();
            startTimer();
        }

        // 左側の問題ナビゲーション
        function renderNavList() {
            questionNavList.innerHTML = '';
            questions.forEach((_, index) => {
                const navItem = document.createElement('div');
                navItem.className = `p-2 border rounded font-bold text-center cursor-pointer transition-colors ${index === currentQuestionIndex ? 'bg-blue-200 border-blue-400' : 'bg-gray-200 border-gray-300 hover:bg-gray-300'}`;
                navItem.innerText = `【問題${index + 1}】`;
                
                navItem.addEventListener('click', () => {
                    if (currentQuestionIndex !== index) {
                        saveAnswer(); 
                        currentQuestionIndex = index;
                        renderQuestion();
                    }
                });

                questionNavList.appendChild(navItem);
            });
        }

        // 問題の表示
        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-number').innerText = `【問題${currentQuestionIndex + 1}】（1点）`;
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;

            // 出題形式に応じて解答エリアを生成
            const answerContainer = document.getElementById('answer-container');
            answerContainer.innerHTML = ''; // クリア

            if (selectedFormat === 'descriptive') {
                // 記述式の場合
                answerContainer.innerHTML = `
                    <label class="block text-sm font-bold text-gray-700 mb-2" for="answer-input">解答を記述してください：</label>
<input type="text" id="answer-input" class="shadow-sm appearance-none border border-gray-400 rounded w-full md:w-1/2 py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" autocomplete="off">
                const answerInput = document.getElementById('answer-input');
                answerInput.value = userAnswers[q.id] || "";
                
                // 入力保存イベント
                answerInput.addEventListener('input', saveAnswer);
                
                // Enterキーで次へ進む
                answerInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (currentQuestionIndex < questions.length - 1) {
                            document.getElementById('next-btn').click();
                        } else {
                            document.getElementById('finish-btn').click();
                        }
                    }
                });
                
                // 少し遅延させてフォーカス（DOMレンダリング直後のため）
                setTimeout(() => answerInput.focus(), 10);
                
            } else {
                // 選択式の場合
                answerContainer.innerHTML = `<label class="block text-sm font-bold text-gray-700 mb-3">正しいものを1つ選択してください：</label>`;
                const optionsDiv = document.createElement('div');
                optionsDiv.className = "flex flex-col gap-2";
                
                q.shuffledOptions.forEach((opt) => {
                    const label = document.createElement('label');
                    label.className = "flex items-center p-3 border rounded cursor-pointer hover:bg-blue-50 transition border-gray-300";
                    
                    const isChecked = userAnswers[q.id] === opt;
                    if (isChecked) {
                        label.classList.add('bg-blue-50', 'border-blue-400');
                    }

                    label.innerHTML = `
                        <input type="radio" name="q${q.id}" value="${opt}" class="mr-3 w-5 h-5 text-blue-600 focus:ring-blue-500" ${isChecked ? 'checked' : ''}>
                        <span class="text-gray-800 font-medium">${opt}</span>
                    `;
                    
                    // 選択時のイベント
                    label.querySelector('input').addEventListener('change', (e) => {
                        saveAnswer();
                        // 選択状態のUI更新
                        Array.from(optionsDiv.children).forEach(child => {
                            child.classList.remove('bg-blue-50', 'border-blue-400');
                        });
                        label.classList.add('bg-blue-50', 'border-blue-400');
                    });
                    
                    optionsDiv.appendChild(label);
                });
                answerContainer.appendChild(optionsDiv);
            }

            // 左側のナビゲーションの色を更新
            Array.from(questionNavList.children).forEach((el, idx) => {
                if (idx === currentQuestionIndex) {
                    el.className = 'p-2 border rounded font-bold text-center cursor-pointer transition-colors bg-blue-200 border-blue-400';
                } else {
                    el.className = 'p-2 border rounded font-bold text-center cursor-pointer transition-colors bg-gray-200 border-gray-300 hover:bg-gray-300';
                }
            });

            // ボタンの表示切り替え
            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === questions.length - 1) {
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('finish-btn').classList.remove('hidden');
            } else {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('finish-btn').classList.add('hidden');
            }
        }

        // 解答の保存
        function saveAnswer() {
            const q = questions[currentQuestionIndex];
            const qId = q.id;
            
            if (selectedFormat === 'descriptive') {
                const answerInput = document.getElementById('answer-input');
                if (answerInput) {
                    userAnswers[qId] = answerInput.value;
                }
            } else {
                const checkedRadio = document.querySelector(`input[name="q${qId}"]:checked`);
                if (checkedRadio) {
                    userAnswers[qId] = checkedRadio.value;
                }
            }
        }

        // タイマー処理
        function updateTimerDisplay() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            document.getElementById('timer-display').innerText = `残り時間 ${min}:${sec.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    saveAnswer(); 
                    executeScoring(); 
                }
            }, 1000);
        }

        // 採点と結果表示
        function executeScoring() {
            if (timerInterval) clearInterval(timerInterval);
            
            testScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            confirmModal.classList.add('hidden');

            let score = 0;
            const resultContainer = document.getElementById('result-list');
            resultContainer.innerHTML = '';

            questions.forEach((q, index) => {
                // 空白を取り除き、全角半角の差異も吸収しやすいように調整（簡易的）
                const userAnswer = (userAnswers[q.id] || "").trim().replace(/　/g, "");
                
                // 別名（表記ゆれ）の対応用ロジック（マスタリー・ラーニングや問答法など）
                let isCorrect = userAnswer === q.answer;
                
                // 産婆術の別解対応
                if (q.id === 1 && userAnswer === "問答法") isCorrect = true;
                // 完全習得学習の別解対応
                if (q.id === 8 && (userAnswer === "マスタリー・ラーニング" || userAnswer === "マスタリーラーニング")) isCorrect = true;

                if (isCorrect) score++;

                const itemHtml = `
                    <div class="border border-gray-300 rounded shadow-sm bg-white overflow-hidden">
                        <div class="bg-blue-50 px-4 py-2 border-b border-gray-300 text-gray-800 font-bold flex items-center">
                            ${isCorrect ? '<span class="text-red-600 font-bold text-xl mr-2">○</span>' : '<span class="text-blue-600 font-bold text-xl mr-2">×</span>'}
                            【問題${index + 1}】（1点）
                        </div>
                        <div class="p-4 md:p-6">
                            <p class="mb-6 text-gray-800 font-medium">${q.text}</p>
                            <table class="w-full border-collapse text-sm">
                                <tbody>
                                    <tr>
                                        <th class="w-1/3 md:w-1/4 theme-bg text-white p-2 border border-gray-300 text-left">正解</th>
                                        <td class="p-2 border border-gray-300 font-bold text-lg">${q.answer}</td>
                                    </tr>
                                    <tr>
                                        <th class="theme-bg text-white p-2 border border-gray-300 text-left">学習者解答</th>
                                        <td class="p-2 border border-gray-300 text-lg ${isCorrect ? '' : 'text-red-600 font-bold'}">${userAnswer === "" ? "<span class='text-gray-400 text-base'>未解答</span>" : userAnswer}</td>
                                    </tr>
                                    <tr>
                                        <th class="theme-bg text-white p-2 border border-gray-300 text-left">点数</th>
                                        <td class="p-2 border border-gray-300">${isCorrect ? '1' : '0'}点／1点</td>
                                    </tr>
                                    <tr>
                                        <th class="theme-bg text-white p-2 border border-gray-300 text-left">問題解説</th>
                                        <td class="p-3 border border-gray-300 text-gray-700 leading-relaxed bg-yellow-50">${q.explanation}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                resultContainer.insertAdjacentHTML('beforeend', itemHtml);
            });

            document.getElementById('total-score').innerText = `${score}点 / ${questions.length}点`;
            
            const passStatus = document.getElementById('pass-status');
            if (score === questions.length) {
                passStatus.innerText = "合格！満点です。よく理解できています。";
                passStatus.className = "text-xl font-bold text-green-600";
            } else {
                passStatus.innerText = "不合格。解説を読んで再度満点を目指して学習しましょう。";
                passStatus.className = "text-xl font-bold text-red-600";
            }
        }

        // イベントリスナーの設定
        document.getElementById('start-btn').addEventListener('click', startTest);
        
        document.getElementById('retry-btn').addEventListener('click', () => {
            startScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');
            window.scrollTo(0, 0); // リトライ時も一番上に戻す
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            saveAnswer();
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            saveAnswer();
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        });

        document.getElementById('finish-btn').addEventListener('click', () => {
            saveAnswer();
            confirmModal.classList.remove('hidden');
        });

        document.getElementById('modal-cancel-btn').addEventListener('click', () => {
            confirmModal.classList.add('hidden');
        });

        document.getElementById('modal-ok-btn').addEventListener('click', () => {
            executeScoring();
        });

    </script>
</body>
</html>
