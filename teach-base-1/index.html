<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教職教養 対策メニュー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ヘッダーやアクセントのカラー */
        .header-bg { background-color: #005662; }
        .tab-active { background-color: #e5f1f4; color: #005662; border-bottom: 2px solid #005662; }
        .tab-inactive { background-color: #f3f4f6; color: #4b5563; }
        .tab-inactive:hover { background-color: #e5e7eb; }
        .status-active { background-color: #a0c832; } /* テスト受付中（黄緑） */
        .status-prep { background-color: #4bc0c8; }   /* テスト準備中（水色） */
    </style>
</head>
<body class="bg-white text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto overflow-hidden">
        <div class="flex-grow pb-6 overflow-y-auto">
            <h1 class="text-xl font-bold mb-4 pb-2 border-b border-gray-300 flex justify-between items-end">
                <span>教職教養 対策</span>
            </h1>

            <!-- タブメニュー -->
            <div class="flex flex-wrap gap-1 mb-4" id="tabs-container">
                <!-- JavaScriptでタブが生成されます -->
            </div>

            <!-- テスト一覧テーブル -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm border-collapse border border-gray-300 text-center min-w-[600px]">
                    <thead class="bg-gray-100 text-gray-700 whitespace-nowrap">
                        <tr>
                            <th class="border border-gray-300 p-3 font-normal w-1/4">確認テスト</th>
                            <th class="border border-gray-300 p-3 font-normal w-20">PDF</th>
                            <th class="border border-gray-300 p-3 font-normal">ステータス</th>
                            <th class="border border-gray-300 p-3 font-normal">合計点数</th>
                            <th class="border border-gray-300 p-3 font-normal">テスト実施</th>
                        </tr>
                    </thead>
                    <tbody id="test-list-body">
                        <!-- ここにJavaScriptでリストが生成されます -->
                    </tbody>
                </table>
            </div>

            <!-- ページネーション -->
            <div class="bg-gray-200 p-2 mt-2 flex justify-center items-center text-sm text-gray-600 gap-4">
                <span id="pagination-info">0件 (1/1)</span>
                <div class="flex gap-3">
                    <span class="text-gray-500">&lt;</span>
                    <span class="text-gray-700 font-bold">1</span>
                    <span class="text-gray-500">&gt;</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 【テストデータ管理】
         * GitHub上でリンクやステータスを変更する場合は、以下のデータを直接書き換えてください。
         * * [項目の説明]
         * ・status:   'active'（公開・受付中） または 'prep'（準備中）
         * ・pdfLink:  PDFのURL（例: './pdf/genri01.pdf' や Google Driveの共有リンク等）
         * ・link:     確認テストのURL（例: './test_genri01.html' や Google Formのリンク等）
         * ・totalScore: '10点' などの表示テキスト
         */
        const allTestsData = [
            // --- 教育原理 (13件) ---
            { category: '教育原理', name: '教育原理01', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%8E%9F%E7%90%8601.pdf', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理02', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%8E%9F%E7%90%8602.pdf', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理03', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%8E%9F%E7%90%8603.pdf', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理04', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%8E%9F%E7%90%8604_compressed.pdf', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理05', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%8E%9F%E7%90%8605.pdf', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理06', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%8E%9F%E7%90%8606.pdf', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理07', status: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/教育原理07_compressed.pdf', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理08', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理09', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理10', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理11', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理12', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育原理', name: '教育原理13', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },

            // --- 教育法規 (7件) ---
            { category: '教育法規', name: '教育法規01', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育法規', name: '教育法規02', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育法規', name: '教育法規03', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育法規', name: '教育法規04', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育法規', name: '教育法規05', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育法規', name: '教育法規06', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育法規', name: '教育法規07', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },

            // --- 西洋教育史 (8件) ---
            { category: '西洋教育史', name: '西洋教育史01', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '西洋教育史', name: '西洋教育史02', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '西洋教育史', name: '西洋教育史03', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '西洋教育史', name: '西洋教育史04', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '西洋教育史', name: '西洋教育史05', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '西洋教育史', name: '西洋教育史06', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '西洋教育史', name: '西洋教育史07', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '西洋教育史', name: '西洋教育史08', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },

            // --- 日本教育史 (9件) ---
            { category: '日本教育史', name: '日本教育史01', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '日本教育史', name: '日本教育史02', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '日本教育史', name: '日本教育史03', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '日本教育史', name: '日本教育史04', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '日本教育史', name: '日本教育史05', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '日本教育史', name: '日本教育史06', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '日本教育史', name: '日本教育史07', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '日本教育史', name: '日本教育史08', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '日本教育史', name: '日本教育史09', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },

            // --- 教育心理 (6件) ---
            { category: '教育心理', name: '教育心理01', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育心理', name: '教育心理02', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育心理', name: '教育心理03', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育心理', name: '教育心理04', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育心理', name: '教育心理05', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
            { category: '教育心理', name: '教育心理06', status: 'prep', pdfLink: '#', link: '#', totalScore: '-' },
        ];

        // タブとして表示するカテゴリのリスト
        const categories = ['教育原理', '教育法規', '西洋教育史', '日本教育史', '教育心理'];
        let currentCategory = '教育原理'; // 初期表示タブ

        // 初期化処理
        function init() {
            renderTabs();
            renderTable(currentCategory);
        }

        // タブを描画する処理
        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';

            categories.forEach(category => {
                const button = document.createElement('button');
                const isActive = category === currentCategory;
                
                // アクティブか非アクティブかでスタイルを切り替え
                button.className = `px-4 py-2 text-sm font-bold rounded-t-md transition-colors ${isActive ? 'tab-active' : 'tab-inactive'}`;
                button.textContent = category;
                
                // タブがクリックされた時の処理
                button.onclick = () => {
                    currentCategory = category;
                    renderTabs(); // タブの見た目（色）を更新
                    renderTable(category); // 選択されたカテゴリのテーブルを再描画
                };
                
                tabsContainer.appendChild(button);
            });
        }

        // テーブル本体を生成・描画する処理
        function renderTable(category) {
            const tbody = document.getElementById('test-list-body');
            tbody.innerHTML = '';

            // 現在選択されているカテゴリのデータのみを抽出
            const filteredData = allTestsData.filter(test => test.category === category);

            filteredData.forEach(test => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";

                const isActive = test.status === "active";
                const statusLabel = isActive ? "テスト受付中" : "テスト準備中";
                const statusClass = isActive ? "status-active" : "status-prep";
                
                // 確認テスト名のリンク生成
                const linkTagOpen = isActive 
                    ? `<a href="${test.link}" class="text-blue-600 underline hover:text-blue-800 font-bold">` 
                    : `<span class="text-gray-400 underline cursor-not-allowed">`;
                const linkTagClose = isActive ? `</a>` : `</span>`;

                // PDF列のHTML生成（アイコン付き）
                const pdfHtml = isActive
                    ? `<a href="${test.pdfLink}" target="_blank" class="text-red-500 hover:text-red-700 font-bold flex items-center justify-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        PDF
                       </a>`
                    : `<span class="text-gray-300 flex items-center justify-center gap-1 cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        PDF
                       </span>`;

                // 実施ボタンのHTML生成
                const btnHtml = isActive
                    ? `<a href="${test.link}" class="inline-block border border-gray-400 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-1 rounded text-xs font-bold transition">テスト実施</a>`
                    : `<button disabled class="border border-gray-200 bg-gray-50 text-gray-300 px-4 py-1 rounded text-xs cursor-not-allowed">テスト実施</button>`;

                tr.innerHTML = `
                    <td class="border border-gray-300 p-2 text-left pl-4 whitespace-nowrap">
                        ${linkTagOpen}${test.name}${linkTagClose}
                    </td>
                    <td class="border border-gray-300 p-2 whitespace-nowrap">
                        ${pdfHtml}
                    </td>
                    <td class="border border-gray-300 p-2 whitespace-nowrap">
                        <span class="inline-block text-white text-xs px-3 py-1 rounded ${statusClass}">
                            ${statusLabel}
                        </span>
                    </td>
                    <td class="border border-gray-300 p-2 text-gray-600 whitespace-nowrap">
                        ${test.totalScore}
                    </td>
                    <td class="border border-gray-300 p-2 whitespace-nowrap">
                        ${btnHtml}
                    </td>
                `;

                tbody.appendChild(tr);
            });

            // ページネーションの件数表示をタブごとに動的更新
            document.getElementById('pagination-info').textContent = `${filteredData.length}件 (1/1)`;
        }

        // ページ読み込み完了時に初期化処理を実行
        window.onload = init;
    </script>
</body>
</html>
