            { category: '教育心理', name: '教育心理03', status: 'active', pdfStatus: 'active', twoInOneStatus: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%BF%83%E7%90%8603.pdf', twoInOneLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%BF%83%E7%90%8603%EF%BC%BB2in1%EF%BC%BD.pdf', link: './sinri-test03/index.html', totalScore: '10' },
            { category: '教育心理', name: '教育心理04', status: 'active', pdfStatus: 'active', twoInOneStatus: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%BF%83%E7%90%8604_compressed.pdf', twoInOneLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%BF%83%E7%90%8604%EF%BC%BB2in1%EF%BC%BD_compressed.pdf', link: './sinri-test04/index.html', totalScore: '10' },
            { category: '教育心理', name: '教育心理05', status: 'active', pdfStatus: 'active', twoInOneStatus: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%BF%83%E7%90%8605.pdf', twoInOneLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%BF%83%E7%90%8605%EF%BC%BB2in1%EF%BC%BD.pdf', link: './sinri-test05/index.html', totalScore: '10' },
            { category: '教育心理', name: '教育心理06', status: 'active', pdfStatus: 'active', twoInOneStatus: 'active', pdfLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%BF%83%E7%90%8606.pdf', twoInOneLink: 'https://n-kyozai.github.io/ununipa.ac.jp/teach-base-1/%E6%95%99%E8%82%B2%E5%BF%83%E7%90%8606%EF%BC%BB2in1%EF%BC%BD.pdf', link: './sinri-test06/index.html', totalScore: '10' }
        ];

        // タブとして表示するカテゴリのリスト（順番を変更）
        const categories = ['教職教養基礎Ⅰ', '教職教養基礎Ⅱ', '教育原理', '教育法規', '西洋教育史', '日本教育史', '教育心理'];
        let currentCategory = '教職教養基礎Ⅰ'; // 初期表示タブを変更

        // 初期化処理
        function init() {
            renderTabs();
            renderTable(currentCategory);
        }

        // タブを描画する処理
        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';

            categories.forEach(category => {
                const button = document.createElement('button');
                const isActive = category === currentCategory;
                
                // アクティブか非アクティブかでスタイルを切り替え
                button.className = `px-4 py-2 text-sm font-bold rounded-t-md transition-colors ${isActive ? 'tab-active' : 'tab-inactive'}`;
                button.textContent = category;
                
                // タブがクリックされた時の処理
                button.onclick = () => {
                    currentCategory = category;
                    renderTabs(); // タブの見た目（色）を更新
                    renderTable(category); // 選択されたカテゴリのテーブルを再描画
                };
                
                tabsContainer.appendChild(button);
            });
        }

        // テーブル本体を生成・描画する処理
        function renderTable(category) {
            const tbody = document.getElementById('test-list-body');
            tbody.innerHTML = '';

            // 2in1列の表示/非表示をカテゴリで判定
            const showTwoInOne = !(category === '教職教養基礎Ⅰ' || category === '教職教養基礎Ⅱ');
            const thTwoInOne = document.getElementById('th-two-in-one');
            if (showTwoInOne) {
                thTwoInOne.style.display = ''; // テーブルセルのデフォルト表示に戻す
            } else {
                thTwoInOne.style.display = 'none'; // 非表示にする
            }

            // 現在選択されているカテゴリのデータのみを抽出
            const filteredData = allTestsData.filter(test => test.category === category);

            filteredData.forEach(test => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";

                const isTestActive = test.status === "active";
                const isPdfActive = test.pdfStatus === "active";
                
                const statusLabel = isTestActive ? "テスト受付中" : "テスト準備中";
                const statusClass = isTestActive ? "status-active" : "status-prep";
                
                // 確認テスト名のリンク生成 (テストのステータスに依存)
                const linkTagOpen = isTestActive 
                    ? `<a href="${test.link}" class="text-blue-600 underline hover:text-blue-800 font-bold">` 
                    : `<span class="text-gray-400 underline cursor-not-allowed">`;
                const linkTagClose = isTestActive ? `</a>` : `</span>`;

                // PDF列のHTML生成（アイコン付き）(PDFのステータスに依存)
                const pdfHtml = isPdfActive
                    ? `<a href="${test.pdfLink}" target="_blank" class="text-red-500 hover:text-red-700 font-bold flex items-center justify-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        PDF
                       </a>`
                    : `<span class="text-gray-300 flex items-center justify-center gap-1 cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        PDF
                       </span>`;

                // 2in1列のHTML生成 (表示フラグと2in1のステータスに依存)
                let twoInOneTd = '';
                if (showTwoInOne) {
                    const isTwoInOneActive = test.twoInOneStatus === "active";
                    const twoInOneHtml = isTwoInOneActive
                        ? `<a href="${test.twoInOneLink}" target="_blank" class="text-orange-500 hover:text-orange-700 font-bold flex items-center justify-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                            </svg>
                            2in1
                           </a>`
                        : `<span class="text-gray-300 flex items-center justify-center gap-1 cursor-not-allowed">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                            </svg>
                            2in1
                           </span>`;
                    twoInOneTd = `<td class="border border-gray-300 p-2 whitespace-nowrap">${twoInOneHtml}</td>`;
                }

                // 実施ボタンのHTML生成 (テストのステータスに依存)
                const btnHtml = isTestActive
                    ? `<a href="${test.link}" class="inline-block border border-gray-400 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-1 rounded text-xs font-bold transition">テスト実施</a>`
                    : `<button disabled class="border border-gray-200 bg-gray-50 text-gray-300 px-4 py-1 rounded text-xs cursor-not-allowed">テスト実施</button>`;

                tr.innerHTML = `
                    <td class="border border-gray-300 p-2 text-left pl-4 whitespace-nowrap">
                        ${linkTagOpen}${test.name}${linkTagClose}
                    </td>
                    <td class="border border-gray-300 p-2 whitespace-nowrap">
                        ${pdfHtml}
                    </td>
                    ${twoInOneTd}
                    <td class="border border-gray-300 p-2 whitespace-nowrap">
                        <span class="inline-block text-white text-xs px-3 py-1 rounded ${statusClass}">
                            ${statusLabel}
                        </span>
                    </td>
                    <td class="border border-gray-300 p-2 text-gray-600 whitespace-nowrap">
                        ${test.totalScore}
                    </td>
                    <td class="border border-gray-300 p-2 whitespace-nowrap">
                        ${btnHtml}
                    </td>
                `;

                tbody.appendChild(tr);
            });

            // ページネーションの件数表示をタブごとに動的更新
            document.getElementById('pagination-info').textContent = `${filteredData.length}件 (1/1)`;
        }

        // ページ読み込み完了時に初期化処理を実行
        window.onload = init;
    </script>
</body>
</html>
